    - name: compile-dbt-manifest-e2e
      inputs:
        parameters:
          - name: branch
          - name: commit_short_sha
      outputs:
        parameters:
          - name: compile_manifest_path
            valueFrom:
              path: /workdir/compile_manifest_path.log
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.dbt_workflow_core_image_name}}:{{workflow.parameters.dbt_workflow_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash


            echo "==========================================="
            echo "🚀 [INFO] DBT Manifest E2E Compilation"
            echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
            echo "==========================================="

            # Leaving empty files for the next steps
            touch /workdir/compile_manifest_path.log
            cd /workdir/src

            echo "🔍 [CHECK] Scanning changed folders for DBT compilation..."

            # Scan changed folders for DBT compilation
            while read folder; do
              if [ -d "$folder" ]; then
                echo "==========================================="
                echo "⚙️ [PROCESS] Compiling DBT Manifest in $folder"
                echo "==========================================="
                
                cd "$folder"
                
                # Set warehouse credentials
                echo "🔐 [CONFIG] Configuring data warehouse credentials..."
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google Bigquery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "🔐 [CONFIG] Setting up BigQuery service account authentication"
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                      gcloud auth activate-service-account --key-file /secrets/sa.json
                      gcloud config set project $GCP_PROJECT_NAME
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] BigQuery authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      echo "🔐 [CONFIG] Setting up Snowflake private key authentication"
                      mkdir -p /snowsql/secrets/
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8
                      chmod 600 /snowsql/secrets/rsa_key.p8
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  fi
                fi
                
                echo "🔍 [CHECK] Validating required Data-Orchestrator environment variables..."
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] AIRFLOW_SECRET_FILE_NAME is undefined"
                  exit 1
                fi
                
                # Set environment variables
                echo "📋 [CONFIG] Loading configuration from secrets file..."
                export MANIFEST_NAME=$(grep 'MANIFEST_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'")
                export TARGET=$(grep 'TARGET:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'")
                export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" )
                export GIT_BRANCH=$(grep 'GIT_BRANCH:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'")
                export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'")
                export operator=$(grep 'OPERATOR:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                export DATA_QUALITY=$(grep 'DATA_QUALITY:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                export DATA_QUALITY_FORCE_E2E=$(grep 'DATA_QUALITY_FORCE_E2E:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                export SOURCE_E2E_TABLESAMPLE=$(grep 'SOURCE_E2E_TABLESAMPLE:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                
                echo "✅ [SUCCESS] Configuration loaded successfully"

                # Create log file
                touch /workdir/compile_dbt_project_manifest.log

                # Prepare the files for bash operator
                if [[ "$operator" == "bash" ]]; then
                  echo "⚙️ [PROCESS] Preparing files for bash operator..."
                  # Create temporary directory
                  mkdir -p /tmp/dbt_project_bash_operator
                  # Copy files to temporary directory
                  cp -r "../$folder" "/tmp/dbt_project_bash_operator/$folder"
                  echo "✅ [SUCCESS] Files prepared for bash operator"
                fi

                # Function to check and modify packages.yml if needed
                check_and_modify_packages() {
                  local packages_file="packages.yml"
                  
                  # Check if re-data package exists in packages.yml
                  if yq -r '.packages[] | select(.package == "re-data/re_data")' "$packages_file" > /dev/null 2>&1; then
                    if [ "$DATA_QUALITY" = "false" ] || [ "$DATA_QUALITY" = "False" ]; then
                      echo "⚠️ [WARNING] DATA_QUALITY is false. Removing re-data package from packages.yml"
                      # Create a temporary file without the re-data package
                      yq 'del(.packages[] | select(.package == "re-data/re_data"))' "$packages_file" > "${packages_file}.tmp"
                      mv "${packages_file}.tmp" "$packages_file"
                      
                      # Force recompilation by removing manifest
                      rm -f "./target/manifest.json"
                      echo "✅ [SUCCESS] re-data package removed and manifest cleared"
                    fi
                  fi
                }

                # Check and modify packages.yml first
                echo "🔍 [CHECK] DATA_QUALITY_FORCE_E2E value: ${DATA_QUALITY_FORCE_E2E}"

                # Check and modify packages if not forced
                if [ "${DATA_QUALITY_FORCE_E2E}" != "True" ] && [ "${DATA_QUALITY_FORCE_E2E}" != "true" ] && [ "${DATA_QUALITY_FORCE_E2E}" != "TRUE" ]; then
                  echo "⚙️ [PROCESS] Processing packages.yml modifications..."
                  if [ -f "packages.yml" ]; then
                    check_and_modify_packages
                  fi
                fi

                # Handle data quality setup if forced
                if [ "${DATA_QUALITY_FORCE_E2E}" == "True" ] || [ "${DATA_QUALITY_FORCE_E2E}" == "true" ] || [ "${DATA_QUALITY_FORCE_E2E}" == "TRUE" ]; then
                  echo "⚙️ [PROCESS] E2E Data Quality force enabled, creating empty data quality schema..."
                  dbt deps --quiet > /dev/null 2>&1
                  dbt run --profiles-dir . --select package:re_data --target ${TARGET} --empty --quiet > /dev/null 2>&1 || true
                  dbt clean --quiet > /dev/null 2>&1
                  echo "✅ [SUCCESS] Empty data quality schema created"
                fi

                echo "==========================================="
                echo "⚙️ [PROCESS] Compiling DBT Project Manifest"
                echo "==========================================="
                
                dbt clean --quiet 2>&1
                dbt deps --quiet 2>&1 | tee -a /workdir/compile_dbt_project_manifest.log || true
                dbt seed --quiet --target $TARGET 2>&1 | tee -a /workdir/compile_dbt_project_manifest.log || true
                dbt compile --exclude test_type:generic test_type:singular package:re_data --target $TARGET 2>&1 | tee -a /workdir/compile_dbt_project_manifest.log || true
                
                echo "✅ [SUCCESS] DBT Compilation completed"
                
                echo "==========================================="
                echo "⚙️ [PROCESS] Setting up E2E test sample table source data"
                echo "==========================================="
                
                echo "📋 [CONFIG] Adding macro file to the dbt project catalog..."
                macros_path=$(yq '.["macro-paths"][] // "macros"' dbt_project.yml)
                # Trim any extra whitespace
                macros_path=$(echo "$macros_path" | xargs)
                
                if [ -d "$macros_path" ]; then
                  echo "✅ [SUCCESS] DBT macros directory exists: $macros_path"
                else
                  echo "⚙️ [PROCESS] Creating DBT macros directory: $macros_path"
                  mkdir -p "$macros_path"  # Use -p to ensure intermediate directories are created if needed.
                  # Check again to confirm creation
                  if [ -d "$macros_path" ]; then
                    echo "✅ [SUCCESS] DBT macros directory created successfully"
                  else
                    echo "❌ [ERROR] Failed to create directory $macros_path. Please check permissions."
                    exit 1  # Exit with an error code if directory creation fails
                  fi
                fi
                
                if [ "${SOURCE_E2E_TABLESAMPLE}" != "false" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "False" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "FALSE" ]; then
                  if [ -f "/usr/app/dbt/macros/create_tablesample_source.sql" ]; then
                    cp /usr/app/dbt/macros/create_tablesample_source.sql ./"$macros_path"
                    echo "✅ [SUCCESS] Tablesample source macro copied"
                  else
                    echo "❌ [ERROR] Source file does not exist: /usr/app/dbt/macros/create_tablesample_source.sql"
                    exit 1
                  fi
                  
                  if [[ ! -z "${TARGET}" ]]; then
                    echo "⚙️ [PROCESS] Running warehouse create dataset sample command..."
                    dbt run-operation create_samples_for_dataset --args '{"percent_sample": 1}' --target="${TARGET}" 2>&1 | tee -a /workdir/compile_dbt_project_manifest.log || true
                    echo "✅ [SUCCESS] Dataset sample creation completed"
                  fi
                fi
                
                echo "✅ [SUCCESS] E2E test sample table setup completed"
                
                echo "==========================================="
                echo "⚙️ [PROCESS] Handling platform-specific manifest deployment"
                echo "==========================================="
                
                # Handle different platforms
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Google Cloud Composer"
                  
                  if [[ -z $GCP_BUCKET_NAME ]]; then
                    echo "❌ [ERROR] GCP_BUCKET_NAME is undefined"
                    exit 1
                  fi
                  
                  echo "⚙️ [PROCESS] Uploading Manifest file to Composer GCS Bucket main catalog..."
                  gsutil cp ./target/manifest.json gs://$GCP_BUCKET_NAME/dags/${DBT_PROJECT_NAME}/${MANIFEST_NAME}.json
                  echo "✅ [SUCCESS] Manifest file uploaded to Composer GCS Bucket"
                  
                  echo "📋 [CONFIG] Saving Manifest file path to Artifacts..."
                  echo "${PLATFORM,,}=gs://$GCP_BUCKET_NAME/dags/${DBT_PROJECT_NAME}/${MANIFEST_NAME}.json" >> /workdir/compile_manifest_path.log
                  
                  # Copy files to final destination for bash operator
                  if [[ "$operator" == "bash" ]]; then
                    echo "⚙️ [PROCESS] Removing existing files..."
                    gsutil rm -rf "gs://$GCP_BUCKET_NAME/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}/*" || true
                    echo "⚙️ [PROCESS] Copying files to final destination for bash operator..."
                    gsutil cp "/tmp/dbt_project_bash_operator/$folder/"* "gs://$GCP_BUCKET_NAME/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}"
                    echo "✅ [SUCCESS] Files copied to bash operator destination"
                  fi
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Apache Airflow"
                  
                  if [[ -z ${GIT_USER_EMAIL} || -z ${GIT_USER_NAME} || -z ${DAG_REPO_PUSH} ]]; then
                    echo "❌ [ERROR] One or more Git variables are undefined"
                    exit 1
                  fi
                  
                  echo "⚙️ [PROCESS] Setting up SSH keys..."
                  export GIT_SSH_COMMAND="ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                  echo "⚙️ [PROCESS] Cloning Airflow dags repository for upload procedure..."
                  git config --global user.email "${GIT_USER_EMAIL}"
                  git config --global user.name "${GIT_USER_NAME}"
                  REPO_DIR="/workdir/airflow-dags"
                  rm -rf $REPO_DIR
                  git clone $DAG_REPO_PUSH $REPO_DIR
                  
                  echo "⚙️ [PROCESS] Uploading Manifest file to Airflow DAG repository..."
                  mkdir -p "$REPO_DIR/dags/${DBT_PROJECT_NAME}/"
                  cp ./target/manifest.json $REPO_DIR/dags/${DBT_PROJECT_NAME}/${MANIFEST_NAME}.json
                  
                  echo "📋 [CONFIG] Saving Manifest file path to Artifacts..."
                  echo "${PLATFORM,,}=$REPO_DIR/dags/${DBT_PROJECT_NAME}/${MANIFEST_NAME}.json" >> /workdir/compile_manifest_path.log
                  
                  # Copy files to final destination for bash operator 
                  if [[ "$operator" == "bash" ]]; then
                    echo "⚙️ [PROCESS] Copying files to final destination for bash operator..."
                    # Create destination directory if it doesn't exist
                    mkdir -p "$REPO_DIR/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}"
                    # Copy files to final destination
                    echo "⚙️ [PROCESS] Removing existing files..."
                    rm -rf "$REPO_DIR/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}/*" || true
                    echo "⚙️ [PROCESS] Copying files to final destination for bash operator..."
                    cp -r "/tmp/dbt_project_bash_operator/$folder/"* "$REPO_DIR/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}"
                    echo "${operator,,}=$REPO_DIR/dags/dbt/${DBT_PROJECT_NAME}_${GIT_BRANCH}" >> /workdir/bash_operator_files_path.log
                    echo "✅ [SUCCESS] Files copied to bash operator destination"
                  fi
                  
                  echo "⚙️ [PROCESS] Committing and pushing changes to repository..."
                  git -C "$REPO_DIR" add -A
                  git -C "$REPO_DIR" commit -am "Update DBT Project Manifest files"
                  git -C "$REPO_DIR" remote set-url --push origin "${DAG_REPO_PUSH}" 
                  git -C "$REPO_DIR" push || true
                  echo "✅ [SUCCESS] Changes committed and pushed to repository"
                  
                else
                  echo "❌ [ERROR] Unknown Platform - error"
                  exit 1
                fi
                
                cd ..
              else
                echo "⚠️ [WARNING] Working on root - skipping folder processing"
              fi
            done < /workdir/changed_folders.txt

            echo "==========================================="
            echo "🔍 [CHECK] Analyzing compilation results"
            echo "==========================================="

            error_found=0
            warning_count=0

            if [ ! -f "/workdir/compile_dbt_project_manifest.log" ]; then
              echo "✅ [SUCCESS] No changes detected - manifest log file does not exist. Proceeding successfully."
            else
              error_found=0
              
              while read -r line; do
                [[ -z "$line" ]] && continue

                if echo "$line" | grep -Ei "(warning|FutureWarning|DeprecationWarning|UserWarning|RuntimeWarning|\[WARNING\]|WARN:|WARNING:|/usr/local/lib/python.*/(site-packages|dist-packages))" > /dev/null; then
                  ((warning_count++))
                  continue
                fi

                # Check if line contains error-like words but in a normal operation context
                if echo "$line" | grep -Ei "fail|error|forbidden|denied" > /dev/null; then
                  # Skip if it appears to be part of a table/object name
                  if echo "$line" | grep -Ei "creating|sampling|building|generating|_raw_" > /dev/null; then
                    # Log for debugging but don't count as error
                    continue
                  fi
                  
                  # More reliable error indicators - actual errors typically have these patterns
                  if echo "$line" | grep -Ei "(\[ERROR\]|exception |failed:|process.*failed|terminated with|returned code [1-9]|unexpected error)" > /dev/null; then
                    echo "❌ [ERROR] Error found in E2E Test DBT Manifest compilation procedure, log file line: $line"
                    error_found=1
                  fi
                fi
              done < /workdir/compile_dbt_project_manifest.log

              if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] E2E Test DBT Manifest compilation procedure failed. Please check the logs for details."
                exit 1
              else
                echo "✅ [SUCCESS] DBT Manifest compilation procedure completed successfully"
              fi
            fi

            echo "==========================================="
            echo "🎉 [SUCCESS] DBT Manifest E2E Compilation Complete"
            echo "📋 [INFO] Branch: {{inputs.parameters.branch}}"
            echo "==========================================="
        env:
          - name: DBT_TARGET
            value: "test"
          - name: GIT_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GIT_USER_EMAIL
          - name: GIT_USER_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: CUSTOMER
          - name: DAG_REPO_PUSH
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DAG_REPO_PUSH
          - name: AIRFLOW_SECRET_FILE_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_SECRET_FILE_NAME
          - name: PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: PLATFORM
          - name: GCP_PROJECT_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_PROJECT_NAME
                optional: true
          - name: GCP_SA_SECRET
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_SA_SECRET
                optional: true
          - name: GCP_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_BUCKET_NAME
                optional: true
          - name: DATA_WAREHOUSE_PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DATA_WAREHOUSE_PLATFORM
          # Redshift secrets
          - name: REDSHIFT_HOST
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_HOST
                optional: true
          - name: REDSHIFT_DATABASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_DATABASE
                optional: true
          - name: REDSHIFT_PORT
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_PORT
                optional: true
          - name: REDSHIFT_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_USER
                optional: true
          - name: REDSHIFT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_PASSWORD
                optional: true
          # Snowflake secrets
          - name: SNOWFLAKE_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: SNOWFLAKE_PRIVATE_KEY
                optional: true
          - name: SNOWFLAKE_PASSPHRASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: SNOWFLAKE_PASSPHRASE
                optional: true
          # Fabric secrets
          - name: FABRIC_SERVER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_SERVER
                optional: true
          - name: FABRIC_DATABASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_DATABASE
                optional: true
          - name: FABRIC_PORT
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_PORT
                optional: true
          - name: FABRIC_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_USER
                optional: true
          - name: FABRIC_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_PASSWORD
                optional: true
          - name: FABRIC_AUTHENTICATION
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_AUTHENTICATION
                optional: true
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: gcp-sa-secret-file
            mountPath: /secrets
          - name: ssh-keys
            mountPath: /root/.ssh/
    - name: compile-dag-e2e
      inputs:
        parameters:
          - name: branch
          - name: commit_short_sha
          - name: target_branch
          - name: ci_job_id
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.data_orchestrator_core_image_name}}:{{workflow.parameters.data_orchestrator_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash
            # Exit on error, treat unset variables as errors, and return value of pipeline is the status of the last command


            echo "==========================================="
            echo "🚀 [INFO] DBT Project Data-Orchestrator DAG Compilation"
            echo "==========================================="

            cd /workdir/src

            # Set global branch name and transform it if needed
            branch_name="{{inputs.parameters.branch}}"
            if [[ "$branch_name" =~ [^a-zA-Z0-9_] ]]; then
              new_branch_name=$(echo "$branch_name" | sed 's/[^a-zA-Z0-9_]/_/g')
              echo "⚠️ [WARNING] Branch name contains symbols. Changing to: ${new_branch_name}"
              branch_name="${new_branch_name}"
            fi

            echo "📋 [CONFIG] Branch name configured: $branch_name"

            while read folder; do
              if [ -d "$folder" ]; then
                echo "==========================================="
                echo "⚙️ [PROCESS] Compiling Data-Orchestrator DAG in directory: $folder"
                echo "==========================================="

                cd "$folder"

                # Tag-based change detection: check if this folder/DAGs should be processed
                if [ -f "/workdir/matched_dags.txt" ]; then
                  if grep -q "^SKIP$" "/workdir/matched_dags.txt"; then
                    echo "⏭️ [SKIP] No dbt tag changes detected. Skipping DAG compilation."
                    break
                  fi
                  _folder_match_count=$(grep -c "^${folder}:" "/workdir/matched_dags.txt" || true)
                  if [ "$_folder_match_count" -eq 0 ]; then
                    echo "⏭️ [SKIP] Folder '$folder' has no tag-matched DAGs, skipping compilation"
                    continue
                  fi
                fi

                # Initialize an array to track created DAG files for this folder
                created_dag_files=()
                
                echo "📋 [CONFIG] Setting up warehouse credentials"
                
                # Set warehouse credentials
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google Bigquery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                      gcloud auth activate-service-account --key-file /secrets/sa.json
                      gcloud config set project $GCP_PROJECT_NAME
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] BigQuery credentials configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      mkdir -p /snowsql/secrets/
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8
                      chmod 600 /snowsql/secrets/rsa_key.p8
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake credentials configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  fi
                  echo "✅ [SUCCESS] Redshift credentials validated"
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  fi
                  echo "✅ [SUCCESS] Fabric credentials validated"
                fi
                
                echo "🔍 [CHECK] Validating required Data-Orchestrator environment variables"
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] AIRFLOW_SECRET_FILE_NAME is undefined"
                  exit 1
                else
                  echo "✅ [SUCCESS] All required variables are defined"
                  echo "📋 [CONFIG] Airflow secret file: $AIRFLOW_SECRET_FILE_NAME"

                  echo "⚙️ [PROCESS] Importing Variables from Airflow Secret yml file"
                  # First check if the variables file exists
                  if [ ! -f "$AIRFLOW_SECRET_FILE_NAME" ]; then
                    echo "❌ [ERROR] Variables file $AIRFLOW_SECRET_FILE_NAME not found"
                    exit 1
                  fi

                  echo "✅ [SUCCESS] Variables file found and validated"

                  export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" )
                  export dbt_project_name=$(grep 'DBT_PROJECT_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  export source_commit_id={{inputs.parameters.commit_short_sha}}
                  export cd_cd_job_id={{inputs.parameters.ci_job_id}}
                  export GIT_BRANCH=$(grep 'GIT_BRANCH:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  export DYNAMIC_DAG=$(grep 'DYNAMIC_DAG:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                fi
                
                echo "📋 [CONFIG] Processing dbt project: $dbt_project_name"

                # Function to create and upload dynamic DAGs
                create_dynamic_dags() {
                  local base_secret_file="$1"
                  local current_project="$dbt_project_name"
                  local dynamic_config_file="dynamic_dag_config.yml"
                  
                  echo "⚙️ [PROCESS] Creating dynamic DAGs for project: $current_project"
                  
                  if [ ! -f "$dynamic_config_file" ]; then
                    echo "❌ [ERROR] Dynamic config file not found: $dynamic_config_file"
                    return 1
                  fi
                  
                  echo "✅ [SUCCESS] Dynamic config file validated"
                  
                  # Get DAG configurations from airflow_dags.yaml
                  echo "📋 [CONFIG] Reading DAG configurations from airflow_dags.yaml"

                  # Use yq to extract DAG configurations for the current project
                  local dag_configs=$(yq -r '.dags[] | select(.project == "'$current_project'") | [.dag_id, .variables_file] | @tsv' /workdir/airflow_dags.yaml)
                  
                  if [ -z "$dag_configs" ]; then
                    echo "❌ [ERROR] No DAG configurations found for project $current_project"
                    return 1
                  fi
                  
                  echo "✅ [SUCCESS] Found DAG configurations for processing"
                    
                  # Process each DAG configuration
                  while IFS=$'\t' read -r dag_id variables_file; do
                    if [ -z "$dag_id" ] || [ -z "$variables_file" ]; then
                      echo "⚠️ [WARNING] Skipping invalid DAG configuration"
                      continue
                    fi
                    
                    echo "⚙️ [PROCESS] Processing DAG: $dag_id"
                    
                    # Verify variables file exists
                    if [ ! -f "$variables_file" ]; then
                      echo "❌ [ERROR] Variables file not found: $variables_file"
                      continue
                    fi
                    
                    echo "✅ [SUCCESS] Variables file validated: $variables_file"
                    
                    # Create DAG file using parameters instead of environment variables
                    echo "⚙️ [PROCESS] Creating DAG file for $dag_id"
                    python /usr/app/tsb-data-orchestrator-core/create_dag_from_template.py --variables-file "$variables_file" --dag-id "$dag_id" 2>&1 | tee -a /workdir/create_dag_from_template.log || true
                    
                    echo "🔍 [CHECK] Verifying DAG file creation"

                    # Move DAG file to dags directory with proper name
                    local dag_file="${dag_id}_dag.py"
                    
                    if [ -f "$dag_file" ]; then
                      echo "⚙️ [PROCESS] Moving DAG file to dags directory"
                      mv "$dag_file" "/workdir/dags/${dag_id}.py"
                      # Track the created DAG file
                      created_dag_files+=("/workdir/dags/${dag_id}.py")
                      echo "✅ [SUCCESS] DAG file created: ${dag_id}.py"
                    else
                      echo "❌ [ERROR] DAG file was not created, skipping..."
                      continue
                    fi
                  done <<< "$dag_configs"
                }

                # Function to create and upload standard DAG
                create_standard_dag() {
                  local base_secret_file="$1"
                  local current_project="$dbt_project_name"
                  
                  echo "⚙️ [PROCESS] Using standard single DAG configuration"
                  # Get the DAG configuration from airflow_dags.yaml
                  local dag_config=$(yq -r '.dags[] | select(.project == "'$current_project'") | [.dag_id, .variables_file] | @tsv' /workdir/airflow_dags.yaml)
                  
                  if [ -z "$dag_config" ]; then
                    echo "❌ [ERROR] Could not find DAG configuration for project $current_project in airflow_dags.yaml"
                    return 1
                  fi
                  
                  IFS=$'\t' read -r dag_id variables_file <<< "$dag_config"
                  
                  echo "📋 [CONFIG] DAG configuration:"
                  echo "  - DAG ID: $dag_id"
                  echo "  - Variables file: $variables_file"
                  
                  # Verify variables file exists
                  if [ ! -f "$variables_file" ]; then
                    echo "❌ [ERROR] Variables file not found: $variables_file"
                    return 1
                  fi
                  
                  # Set environment variables
                  export AIRFLOW_SECRET_FILE_NAME="$variables_file"
                  export DAG_ID="$dag_id"
                  export DBT_PROJECT_DAG_ID="$dag_id"
                  
                  echo "⚙️ [PROCESS] Creating standard DAG file"
                  python /usr/app/tsb-data-orchestrator-core/create_dag_from_template.py 2>&1 | tee -a /workdir/create_dag_from_template.log || true
                  echo "✅ [SUCCESS] Standard DAG file created"

                  echo "🔍 [CHECK] Verifying DAG file creation"
                  
                  # Move DAG file to dags directory with proper name
                  local dag_file="${dag_id}_dag.py"

                  if [ -f "$dag_file" ]; then
                    echo "⚙️ [PROCESS] Moving DAG file to dags directory"
                    mv "$dag_file" "/workdir/dags/${dag_id}.py"
                    # Track the created DAG file
                    created_dag_files+=("/workdir/dags/${dag_id}.py")
                    echo "✅ [SUCCESS] DAG file created: ${dag_id}.py"
                  else
                    echo "❌ [ERROR] DAG file was not created, skipping..."
                    return 1
                  fi
                }

                # Create directory for DAG files if it doesn't exist
                mkdir -p /workdir/dags
                
                echo "==========================================="
                echo "⚙️ [PROCESS] Compiling DBT Project DAG"
                echo "==========================================="
                
                if [ "${DYNAMIC_DAG,,}" == "true" ]; then
                  echo "📋 [CONFIG] Dynamic DAG is enabled. Creating multiple DAG files..."
                  create_dynamic_dags "$AIRFLOW_SECRET_FILE_NAME"
                else
                  echo "📋 [CONFIG] Using standard single DAG configuration..."
                  create_standard_dag "$AIRFLOW_SECRET_FILE_NAME"
                fi

                echo "✅ [SUCCESS] DAG for dbt project $dbt_project_name was created"
                
                echo "==========================================="
                echo "🔍 [CHECK] Platform Configuration"
                echo "==========================================="
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  echo "🔍 [CHECK] Validating required env variables for Composer service"
                  if [[ -z $GCP_BUCKET_NAME ]]; then
                    echo "❌ [ERROR] GCP_BUCKET_NAME is undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All Composer variables are defined"
                    echo "⚙️ [PROCESS] Uploading DAG file to Composer GCS Bucket"
                    if [ "${DYNAMIC_DAG,,}" == "true" ]; then
                      if [ ${#created_dag_files[@]} -gt 0 ]; then
                        echo "⚙️ [PROCESS] Uploading dynamic DAGs to GCS bucket"
                        for dag_file in "${created_dag_files[@]}"; do
                          gsutil -m cp "$dag_file" "gs://$GCP_BUCKET_NAME/dags/$folder/"
                          echo "${PLATFORM,,}=gs://$GCP_BUCKET_NAME/dags/$folder/$(basename $dag_file)" >> /workdir/compile_dag_path.log
                          echo "✅ [SUCCESS] Uploaded: $(basename $dag_file)"
                        done
                      else
                        echo "❌ [ERROR] No DAG files found for upload"
                        exit 1
                      fi
                    else
                      gsutil -m cp "${created_dag_files[0]}" "gs://$GCP_BUCKET_NAME/dags/$folder/"
                      echo "${PLATFORM,,}=gs://$GCP_BUCKET_NAME/dags/$folder/$(basename ${created_dag_files[0]})" >> /workdir/compile_dag_path.log
                      echo "✅ [SUCCESS] Uploaded: $(basename ${created_dag_files[0]})"
                    fi
                    echo "✅ [SUCCESS] TSB DBT Parser Libraries check completed"
                    echo "✅ [SUCCESS] Upload to Composer completed"
                  fi
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating required env variables for Data-Orchestrator service"
                  if [[ -z ${GIT_USER_EMAIL} || -z ${GIT_USER_NAME} || -z ${DAG_REPO_PUSH} ]]; then
                    echo "❌ [ERROR] One or more Airflow variables are undefined"
                    exit 1
                  else
                    echo "⚙️ [PROCESS] Setting up SSH keys..."
                    export GIT_SSH_COMMAND="ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                    echo "✅ [SUCCESS] All Airflow variables are defined"
                    echo "⚙️ [PROCESS] Cloning Airflow dags repository for upload procedure"
                    git config --global user.email "${GIT_USER_EMAIL}"
                    git config --global user.name "${GIT_USER_NAME}"
                    REPO_DIR=/workdir/airflow-dags
                    if [ ! -d "$REPO_DIR" ]; then
                      echo "📋 [CONFIG] Repository directory does not exist - creating"
                    else
                      echo "📋 [CONFIG] Repository directory exists - cleaning up"
                      rm -fr $REPO_DIR
                    fi
                    git clone $DAG_REPO_PUSH $REPO_DIR
                    if [ ! -d "$REPO_DIR/dags/" ]; then
                      echo "📋 [CONFIG] Dags directory does not exist - creating"
                      mkdir "$REPO_DIR/dags/"
                    else
                      echo "📋 [CONFIG] Dags directory exists - continuing"
                    fi
                    echo "⚙️ [PROCESS] Uploading DAG file to Airflow DAG repository"
                    if [ ! -d "$REPO_DIR/dags/$folder/" ]; then
                      echo "📋 [CONFIG] Project directory does not exist - creating"
                      mkdir $REPO_DIR/dags/$folder/
                    else
                      echo "📋 [CONFIG] Project directory exists - continuing"
                    fi
                    if [ "${DYNAMIC_DAG,,}" == "true" ]; then
                      if [ ${#created_dag_files[@]} -gt 0 ]; then
                        echo "⚙️ [PROCESS] Copying dynamic DAGs to repository"
                        for dag_file in "${created_dag_files[@]}"; do
                          cp "$dag_file" $REPO_DIR/dags/$folder/
                          echo "${PLATFORM,,}=$REPO_DIR/dags/$folder/$(basename $dag_file)" >> /workdir/compile_dag_path.log
                          echo "✅ [SUCCESS] Copied: $(basename $dag_file)"
                        done
                      else
                        echo "❌ [ERROR] No DAG files found for upload"
                        exit 1
                      fi
                    else
                      cp "${created_dag_files[0]}" $REPO_DIR/dags/$folder/
                      echo "${PLATFORM,,}=$REPO_DIR/dags/$folder/$(basename ${created_dag_files[0]})" >> /workdir/compile_dag_path.log
                      echo "✅ [SUCCESS] Copied: $(basename ${created_dag_files[0]})"
                    fi
                    echo "✅ [SUCCESS] TSB DBT Parser Libraries check completed"
                    echo "✅ [SUCCESS] Upload to repository completed"
                    git -C "$REPO_DIR" add -A
                    git -C "$REPO_DIR" commit -am"Update DBT Project DAG files."
                    git -C "$REPO_DIR" remote set-url --push origin "${DAG_REPO_PUSH}" 
                    git -C "$REPO_DIR" push || true
                    echo "✅ [SUCCESS] Git push completed"
                  fi
                else
                  echo "❌ [ERROR] Unknown Platform: ${PLATFORM}"
                  exit 1
                fi
                cd ..
              else
                echo "📋 [CONFIG] Working on root - skipping"
              fi
            done < /workdir/changed_folders.txt

            echo "==========================================="
            echo "🔍 [CHECK] Error Analysis"
            echo "==========================================="

            error_found=0
            warning_count=0

            if [ ! -f "/workdir/create_dag_from_template.log" ]; then
              echo "📋 [CONFIG] No changes detected - DAG template log file does not exist. Proceeding successfully."
            else
              while read -r line; do
                [[ -z "$line" ]] && continue

                if echo "$line" | grep -Ei "(warning|FutureWarning|DeprecationWarning|UserWarning|RuntimeWarning|\[WARNING\]|WARN:|WARNING:|/usr/local/lib/python.*/(site-packages|dist-packages))" > /dev/null; then
                  ((warning_count++))
                  continue
                fi

                if echo "$line" | grep -Ei "fail|error|forbidden|denied" > /dev/null; then
                  echo "❌ [ERROR] Error found in E2E Test DAG Compilation procedure, log file line: $line"
                  error_found=1
                fi
              done < /workdir/create_dag_from_template.log

              if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] E2E Test DAG Compilation procedure failed. Please check the logs for details."
                exit 1
              else
                echo "✅ [SUCCESS] DBT Project DAG Compilation procedure completed successfully"
              fi
            fi

            echo "==========================================="
            echo "✅ [SUCCESS] DBT Project Data-Orchestrator DAG Compilation Completed"
            echo "==========================================="
        env:
          - name: DBT_TARGET
            value: "test"
          - name: DATA_WAREHOUSE_PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DATA_WAREHOUSE_PLATFORM
          - name: AIRFLOW_SECRET_FILE_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_SECRET_FILE_NAME
          - name: DAG_REPO_PUSH
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DAG_REPO_PUSH
          - name: GIT_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GIT_USER_EMAIL
          - name: GIT_USER_NAME
