                key: FABRIC_PORT
                optional: true
          - name: FABRIC_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_USER
                optional: true
          - name: FABRIC_PASSWORD
