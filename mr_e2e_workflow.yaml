  volumeClaimTemplates:
    - metadata:
        name: workdir
        creationTimestamp: null
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: "{{workflow.parameters.storage_class}}"
      status: {}
  onExit: exit-handler
  ttlStrategy:
    secondsAfterCompletion: 86400
  activeDeadlineSeconds: 7200
  podGC:
    strategy: OnPodCompletion
  podSpecPatch: |
    containers:
      - name: main
        imagePullPolicy: Always
        env:
          - name: PYTHONWARNINGS
            value: "ignore"
