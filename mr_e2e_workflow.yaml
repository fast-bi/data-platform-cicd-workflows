    - name: data-model-e2e-dag-run-trigger
      inputs:
        parameters:
          - name: branch
          - name: commit_short_sha
      outputs:
        parameters:
          - name: dag_run_id
            valueFrom:
              path: /workdir/dag_run_id.env
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.data_orchestrator_core_image_name}}:{{workflow.parameters.data_orchestrator_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash
            # Exit on error, treat unset variables as errors, and return value of pipeline is the status of the last command


            # ===========================================
            # E2E Data-Pipeline DAG Trigger Script
            # ===========================================
            # This script is used to trigger the E2E Data-Pipeline DAGs for the DBT Project.
            # It is used in the Argo Workflow to trigger the DAGs for the E2E Test Run.
            # ===========================================

            echo "🚀 [INFO] Starting DBT Project DAG E2E Data-Pipeline Trigger procedure"
            echo "=========================================="

            # Navigate to source directory
            cd /workdir/src || { echo "❌ [ERROR] Failed to navigate to /workdir/src"; exit 1; }

            # ===========================================
            # DAG RUN ID GENERATION
            # ===========================================
            echo "⚙️ [PROCESS] Generating unique DAG run ID"
            touch /workdir/dag_run_id.env || { echo "❌ [ERROR] Failed to create dag_run_id.env file"; exit 1; }

            # Generate unique dag_run_id
            uuid=$(uuidgen) || { echo "❌ [ERROR] Failed to generate UUID"; exit 1; }
            uuid=${uuid/-/_0x}
            uuid=${uuid%_*-*-*-*}
            export "dag_run_id=e2e_test_run_{{ inputs.parameters.commit_short_sha }}_${uuid}" 
            echo "dag_run_id=$dag_run_id" > ../dag_run_id.env || { echo "❌ [ERROR] Failed to write dag_run_id to file"; exit 1; }
            echo "✅ [SUCCESS] DAG run ID generated: ${dag_run_id:0:20}..."

            # ===========================================
            # PRE-PROCESSING BRANCH DAGS
            # ===========================================
            echo "⚙️ [PROCESS] Pre-processing branch: {{inputs.parameters.branch}} DAGs"
            python /usr/app/tsb-data-orchestrator-core/airflow_reserialize_dag.py 2>&1 || echo "⚠️ [WARNING] DAG reserialization completed with warnings"

            # ===========================================
            # DAG TRIGGER FUNCTIONS
            # ===========================================

            # Function to trigger DAGs
            trigger_dags() {
              local platform="$1"
              local dag_id="$2"
              local branch_name="{{inputs.parameters.branch}}"
              
              echo "⚙️ [PROCESS] Triggering DAG: $dag_id"
              
              if [ "${platform,,}" == "composer" ]; then
                echo "📋 [CONFIG] Platform: Composer"
                echo "🔍 [CHECK] Validating Composer environment variables"
                
                if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email ]]; then
                  echo "❌ [ERROR] One or more Composer environment variables are undefined"
                  return 1
                else  
                  echo "✅ [SUCCESS] All Composer variables are defined"
                  echo "⚙️ [PROCESS] Triggering Airflow DAG: $dag_id"
                  export DAG_ID="$dag_id"
                  python /usr/app/tsb-data-orchestrator-core/run_dag_airflow_bauth.op.py 2>&1 | tee -a /workdir/triggering_dag_procedure.log || echo "⚠️ [WARNING] DAG trigger completed with warnings"
                fi 
              elif [ "${platform,,}" == "airflow" ]; then
                echo "📋 [CONFIG] Platform: Airflow"
                echo "🔍 [CHECK] Validating Airflow environment variables"
                
                if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD ]]; then
                  echo "❌ [ERROR] One or more Airflow environment variables are undefined"
                  return 1
                else  
                  echo "✅ [SUCCESS] All Airflow variables are defined"
                  echo "⚙️ [PROCESS] Pre-processing DAG"
                  export DAG_ID="$dag_id"
                  echo "⚙️ [PROCESS] Triggering Airflow DAG: $dag_id"
                  python /usr/app/tsb-data-orchestrator-core/run_dag_airflow_bauth.op.py 2>&1 | tee -a /workdir/triggering_dag_procedure.log || echo "⚠️ [WARNING] DAG trigger completed with warnings"
                fi
              else
                echo "❌ [ERROR] Unknown platform: $platform"
                return 1
              fi
            }

            # Function to process DAGs for a project
            process_project_dags() {
              local project_name="$1"
              local platform="$2"
              
              echo "📋 [CONFIG] Reading DAG configurations from airflow_dags.yaml"
              
              # Get all DAG configurations for the current project
              local dag_configs=$(yq -r '.dags[] | select(.project == "'$project_name'") | .dag_id' /workdir/airflow_dags.yaml) || { echo "❌ [ERROR] Failed to read DAG configurations"; return 1; }
              
              if [ -z "$dag_configs" ]; then
                echo "❌ [ERROR] No DAG configurations found for project $project_name in airflow_dags.yaml"
                return 1
              fi
              
              echo "✅ [SUCCESS] Found DAG configurations for project $project_name"
              
              # Process each DAG configuration
              while IFS= read -r dag_id; do
                if [ -n "$dag_id" ]; then
                  echo "⚙️ [PROCESS] Processing DAG: $dag_id"
                  trigger_dags "$platform" "$dag_id"
                fi
              done <<< "$dag_configs"
            }

            # ===========================================
            # MAIN PROCESSING LOOP
            # ===========================================
            echo "🚀 [INFO] Starting main processing loop for changed folders"

            # Tag-based change detection: skip trigger if no DAGs matched
            if [ -f "/workdir/matched_dags.txt" ] && grep -q "^SKIP$" "/workdir/matched_dags.txt"; then
              echo "⏭️ [SKIP] No dbt tag changes detected. Skipping DAG trigger."
              exit 0
            fi

            while read folder; do
              if [ -d "$folder" ]; then
                echo "=========================================="
                echo "⚙️ [PROCESS] Processing directory: $folder"
                echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
                cd "$folder" || { echo "❌ [ERROR] Failed to navigate to directory: $folder"; exit 1; }
                
                # ===========================================
                # WAREHOUSE CREDENTIALS SETUP
                # ===========================================
                echo "🔍 [CHECK] Setting up warehouse credentials for platform: ${DATA_WAREHOUSE_PLATFORM,,}"
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google BigQuery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "⚙️ [PROCESS] Setting up Google Cloud authentication"
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json || { echo "❌ [ERROR] Failed to decode service account secret"; exit 1; }
                      gcloud auth activate-service-account --key-file /secrets/sa.json || { echo "❌ [ERROR] Failed to activate service account"; exit 1; }
                      gcloud config set project $GCP_PROJECT_NAME || { echo "❌ [ERROR] Failed to set GCP project"; exit 1; }
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] Google Cloud authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      echo "⚙️ [PROCESS] Setting up Snowflake authentication"
                      mkdir -p /snowsql/secrets/ || { echo "❌ [ERROR] Failed to create Snowflake secrets directory"; exit 1; }
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to write Snowflake private key"; exit 1; }
                      chmod 600 /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to set Snowflake key permissions"; exit 1; }
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Redshift credentials validated"
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Fabric credentials validated"
                  fi
                fi
                
                # ===========================================
                # AIRFLOW VARIABLES IMPORT
                # ===========================================
                echo "🔍 [CHECK] Validating Data-Orchestrator environment variables"
                
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] AIRFLOW_SECRET_FILE_NAME is undefined"
                  exit 1
                else
                  echo "✅ [SUCCESS] All required variables are defined"
                  echo "⚙️ [PROCESS] Importing variables from Airflow secret file"
                  
                  export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract PLATFORM from secret file"; exit 1; }
                  export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME from secret file"; exit 1; }
                  
                  echo "📋 [CONFIG] Platform: $PLATFORM"
                  echo "📋 [CONFIG] DBT Project: $DBT_PROJECT_NAME"
                fi 

                # Create log file for DAG triggering
                touch /workdir/triggering_dag_procedure.log || { echo "❌ [ERROR] Failed to create triggering log file"; exit 1; }

                # Process DAGs for the current project
                echo "⚙️ [PROCESS] Processing DAGs for project: $DBT_PROJECT_NAME"
                process_project_dags "$DBT_PROJECT_NAME" "$PLATFORM"
                
                cd .. || { echo "❌ [ERROR] Failed to return to parent directory"; exit 1; }
              else
                echo "📋 [CONFIG] Working on root - skipping directory processing"
              fi
            done < /workdir/changed_folders.txt

            # ===========================================
            # ERROR ANALYSIS AND COMPLETION
            # ===========================================
            echo "=========================================="
            echo "🔍 [CHECK] Analyzing DAG trigger procedure results"

            error_found=0

            if [ ! -f "/workdir/triggering_dag_procedure.log" ]; then
              echo "✅ [SUCCESS] No changes detected - DAG trigger log file does not exist. Proceeding successfully."
            else
              echo "⚙️ [PROCESS] Checking trigger procedure log for errors"
              
              while read -r line; do
                if echo "$line" | grep -Ei "fail|error|forbidden|denied" > /dev/null; then
                  echo "❌ [ERROR] Error found in E2E Test DBT Project DAG trigger procedure log: $line"
                  error_found=1
                fi
              done < /workdir/triggering_dag_procedure.log

              if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] E2E Test DBT Project DAG trigger procedure has failed. Please check the logs for details."
                exit 1
              else
                echo "✅ [SUCCESS] E2E Test DBT Project DAG trigger procedure completed successfully"
              fi
            fi

            echo "=========================================="
            echo "🎉 [SUCCESS] DBT Project DAG E2E Data-Pipeline Trigger procedure completed"
            echo "=========================================="
