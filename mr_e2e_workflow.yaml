      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.dbt_workflow_core_image_name}}:{{workflow.parameters.dbt_workflow_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash


            echo "==========================================="
            echo "🚀 [INFO] DBT Project DAG E2E BQ Dataset Labeling"
            echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
            echo "==========================================="

            echo "⚙️ [PROCESS] Starting DBT Project DAG E2E BQ Dataset labeling procedure"
            cd /workdir/src

            while read folder; do
              if [ -d "$folder" ]; then
                echo "==========================================="
                echo "🔍 [CHECK] Processing directory: $folder"
                echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
                echo "==========================================="
                
                cd "$folder"
                
                # Set warehouse credentials
                echo "🔐 [CONFIG] Configuring data warehouse credentials"
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google BigQuery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "⚙️ [PROCESS] Setting up Google Cloud authentication"
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json || { echo "❌ [ERROR] Failed to decode service account secret"; exit 1; }
                      gcloud auth activate-service-account --key-file /secrets/sa.json || { echo "❌ [ERROR] Failed to activate service account"; exit 1; }
                      gcloud config set project $GCP_PROJECT_NAME || { echo "❌ [ERROR] Failed to set GCP project"; exit 1; }
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] Google Cloud authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  echo "⚠️ [WARNING] Skipping tagging procedure - not required for Snowflake data warehouse"
                  exit 0
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      echo "⚙️ [PROCESS] Setting up Snowflake authentication"
                      mkdir -p /snowsql/secrets/ || { echo "❌ [ERROR] Failed to create Snowflake secrets directory"; exit 1; }
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to write Snowflake private key"; exit 1; }
                      chmod 600 /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to set Snowflake key permissions"; exit 1; }
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  echo "⚠️ [WARNING] Skipping tagging procedure - not required for Redshift data warehouse"
                  exit 0
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  echo "⚠️ [WARNING] Skipping tagging procedure - not required for Fabric data warehouse"
                  exit 0
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  fi
                fi
                
                echo "🔍 [CHECK] Validating Data-Orchestrator environment variables"
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] Required environment variables are undefined"
                  exit 1
                else
                  echo "✅ [SUCCESS] All required variables are defined"
                  echo "⚙️ [PROCESS] Importing variables from Airflow Secret YAML file"
                  
                  export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract PLATFORM variable"; exit 1; }
                  export dag_id=$(grep 'DAG_ID:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract DAG_ID variable"; exit 1; }
                  export TARGET=$(grep 'TARGET:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract TARGET variable"; exit 1; }
                  export GIT_BRANCH=$(grep 'GIT_BRANCH:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract GIT_BRANCH variable"; exit 1; }
                  export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME variable"; exit 1; }
                  export DATA_QUALITY_FORCE_E2E=$(grep 'DATA_QUALITY_FORCE_E2E:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" ) || { echo "❌ [ERROR] Failed to extract DATA_QUALITY_FORCE_E2E variable"; exit 1; }
                  
                  echo "✅ [SUCCESS] Variables imported successfully"
                fi
                
                if [[ "${DATA_QUALITY_FORCE_E2E}" == "true" || "${DATA_QUALITY_FORCE_E2E}" == "True" || "${DATA_QUALITY_FORCE_E2E}" == "TRUE" ]]; then
                  echo "⚙️ [PROCESS] E2E Data Quality force enabled - creating empty data quality schema"
                  dbt deps --quiet > /dev/null 2>&1 || { echo "⚠️ [WARNING] DBT deps command completed with warnings"; }
                  dbt run --profiles-dir . --select package:re_data --target ${TARGET} --empty --quiet > /dev/null 2>&1 || { echo "⚠️ [WARNING] DBT run command completed with warnings"; }
                  dbt clean --quiet > /dev/null 2>&1 || { echo "⚠️ [WARNING] DBT clean command completed with warnings"; }
                  echo "✅ [SUCCESS] Empty data quality schema created"
                fi
                
                touch /workdir/create_dbt_bq_dataset_labels.log || { echo "❌ [ERROR] Failed to create log file"; exit 1; }

                # For dynamic DAG projects, restrict labeling to matched DAG tags only
                export E2E_MATCHED_TAGS=""
                DYNAMIC_DAG_VAL=$(grep 'DYNAMIC_DAG:' "${AIRFLOW_SECRET_FILE_NAME}" 2>/dev/null | tail -n1 | awk '{print $2}' | tr -d "'")
                if [[ "${DYNAMIC_DAG_VAL,,}" == "true" ]] && [ -f /workdir/matched_dags.txt ] && [ -f dynamic_dag_config.yml ]; then
                  MATCHED_DAG_NAMES=$(grep "^${folder}:" /workdir/matched_dags.txt | cut -d: -f2)
                  ALL_TAGS=""
                  for dag_name in $MATCHED_DAG_NAMES; do
                    DAG_TAGS=$(yq -r ".dags.${dag_name}.DBT_TAGS // [] | .[]" dynamic_dag_config.yml 2>/dev/null | tr '\n' ',')
                    ALL_TAGS="${ALL_TAGS}${DAG_TAGS}"
                  done
                  E2E_MATCHED_TAGS=$(echo "$ALL_TAGS" | sed 's/,$//' | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
                  echo "📋 [CONFIG] Dynamic DAG — restricting labeling to tags: ${E2E_MATCHED_TAGS}"
                fi
                export E2E_MATCHED_TAGS

                echo "🔍 [CHECK] Validating platform configuration"
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  echo "🔍 [CHECK] Validating Composer environment variables"
                  if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email || -z $dag_id ]]; then
                    echo "❌ [ERROR] One or more Composer variables are undefined"
                    exit 1
                  else
                    echo "✅ [SUCCESS] All Composer variables are defined"
                    echo "⚙️ [PROCESS] Executing DBT BigQuery dataset labeling for Composer"
                    bash /usr/app/dbt/dbt_bq_dataset_label_add.sh 2>&1 | tee -a /workdir/create_dbt_bq_dataset_labels.log || { echo "⚠️ [WARNING] Dataset labeling completed with warnings"; }
                  fi
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating Airflow environment variables"
                  if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD || -z $dag_id ]]; then
                    echo "❌ [ERROR] One or more Airflow variables are undefined"
                    exit 1
                  else
                    echo "✅ [SUCCESS] All Airflow variables are defined"
                    echo "⚙️ [PROCESS] Executing DBT BigQuery dataset labeling for Airflow"
                    bash /usr/app/dbt/dbt_bq_dataset_label_add.sh 2>&1 | tee -a /workdir/create_dbt_bq_dataset_labels.log || { echo "⚠️ [WARNING] Dataset labeling completed with warnings"; }
                  fi
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM}"
                  exit 1
                fi
                
                cd ..
              else
                echo "⚠️ [WARNING] Working on root - skipping directory processing"
              fi
            done < /workdir/changed_folders.txt

            echo "==========================================="
            echo "🔍 [CHECK] Analyzing dataset labeling results"
            echo "==========================================="

            error_found=0
            warning_count=0

            if [ ! -f "/workdir/create_dbt_bq_dataset_labels.log" ]; then
              echo "✅ [SUCCESS] No changes detected - BQ dataset labeling log file does not exist. Proceeding successfully."
            else
              echo "⚙️ [PROCESS] Processing dataset labeling log file"
              while IFS= read -r line || [[ -n "$line" ]]; do
                [[ -z "$line" ]] && continue
                
                if echo "$line" | grep -Ei "(warning|FutureWarning|DeprecationWarning|UserWarning|RuntimeWarning|\[WARNING\]|WARN:|WARNING:|/usr/local/lib/python.*/(site-packages|dist-packages))" > /dev/null; then
                  ((warning_count++))
                  continue
                fi
                
                # Check for actual errors (after filtering warnings)
                if echo "$line" | grep -Ei "(fail|error|forbidden|denied|exception|timeout|connection refused|permission denied|authentication failed|quota exceeded)" > /dev/null; then
                  # Determine error type
                  if echo "$line" | grep -Ei "fail" > /dev/null; then
                    error_type="Failure"
                  elif echo "$line" | grep -Ei "error" > /dev/null; then
                    error_type="Error"
                  elif echo "$line" | grep -Ei "forbidden|denied|permission" > /dev/null; then
                    error_type="Permission"
                  elif echo "$line" | grep -Ei "timeout|connection" > /dev/null; then
                    error_type="Connection"
                  else
                    error_type="Error"
                  fi
                  
                  echo "❌ [$error_type] During BQ dataset labeling: $line"
                  error_found=1
                fi
              done < /workdir/create_dbt_bq_dataset_labels.log
              
              if [ $warning_count -gt 0 ]; then
                echo "⚠️ [WARNING] Found $warning_count warnings during processing"
              fi
              
              if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] E2E Test DBT Project DAG E2E BQ Dataset labeling procedure has failed. Please check the logs for details."
                exit 1
              else
                echo "✅ [SUCCESS] DBT Project DAG E2E BQ Dataset labeling procedure completed successfully"
              fi
            fi

            echo "==========================================="
            echo "🎉 [SUCCESS] DBT Project DAG E2E BQ Dataset Labeling Complete"
            echo "==========================================="
        env:
          - name: DBT_TARGET
            value: "test"
          - name: DATASET_LABEL_KEY
            value: "fast-bi-e2e-environment"
          - name: DATASET_LABEL_VALUE
            value: "e2e-test"
          - name: DATA_WAREHOUSE_PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DATA_WAREHOUSE_PLATFORM
          - name: AIRFLOW_SECRET_FILE_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_SECRET_FILE_NAME
          - name: DAG_REPO_PUSH
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DAG_REPO_PUSH
          - name: GIT_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GIT_USER_EMAIL
          - name: GIT_USER_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: CUSTOMER
          - name: AIRFLOW_URL
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_URL
          - name: AIRFLOW_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_USER
          - name: AIRFLOW_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_PASSWORD
          - name: GCP_PROJECT_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_PROJECT_NAME
                optional: true
          - name: GCP_SA_SECRET
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_SA_SECRET
                optional: true
          - name: GCP_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_BUCKET_NAME
                optional: true
          # Redshift secrets
          - name: REDSHIFT_HOST
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_HOST
                optional: true
          - name: REDSHIFT_DATABASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_DATABASE
                optional: true
          - name: REDSHIFT_PORT
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_PORT
                optional: true
          - name: REDSHIFT_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_USER
                optional: true
          - name: REDSHIFT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: REDSHIFT_PASSWORD
                optional: true
          # Snowflake secrets
          - name: SNOWFLAKE_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: SNOWFLAKE_PRIVATE_KEY
                optional: true
          - name: SNOWFLAKE_PASSPHRASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: SNOWFLAKE_PASSPHRASE
                optional: true
          # Fabric secrets
          - name: FABRIC_SERVER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_SERVER
                optional: true
          - name: FABRIC_DATABASE
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_DATABASE
                optional: true
          - name: FABRIC_PORT
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_PORT
                optional: true
          - name: FABRIC_USER
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_USER
                optional: true
          - name: FABRIC_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_PASSWORD
                optional: true
          - name: FABRIC_AUTHENTICATION
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: FABRIC_AUTHENTICATION
                optional: true
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: gcp-sa-secret-file
            mountPath: /secrets
    - name: data-model-e2e-data-cleanning
      inputs:
        parameters:
          - name: branch
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.dbt_workflow_core_image_name}}:{{workflow.parameters.dbt_workflow_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash


            echo "==========================================="
            echo "🚀 [INFO] DBT Project DAG E2E Dataset Cleaning"
            echo "==========================================="
            echo "📋 [CONFIG] Starting cleanup procedure for branch: {{inputs.parameters.branch}}"
            echo ""

            cd /workdir/src

            while read folder; do
              if [ -d "$folder" ]; then
                echo "==========================================="
                echo "⚙️ [PROCESS] Processing directory: $folder"
                echo "==========================================="
                
                cd "$folder"
                
                # ===========================================
                # 🔐 [SECURITY] Warehouse Credentials Setup
                # ===========================================
                echo "🔍 [CHECK] Configuring warehouse credentials..."
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google BigQuery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "🔐 [CONFIG] Setting up Google Cloud authentication..."
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                      gcloud auth activate-service-account --key-file /secrets/sa.json
                      gcloud config set project $GCP_PROJECT_NAME
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] Google Cloud authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      echo "🔐 [CONFIG] Setting up Snowflake authentication..."
                      mkdir -p /snowsql/secrets/
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8
                      chmod 600 /snowsql/secrets/rsa_key.p8
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Redshift credentials validated"
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Fabric credentials validated"
                  fi
                fi
                
                # ===========================================
                # 📋 [CONFIG] Environment Variables Import
                # ===========================================
                echo "🔍 [CHECK] Validating required Data-Orchestrator environment variables..."
                
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] AIRFLOW_SECRET_FILE_NAME is undefined"
                  exit 1
                else
                  echo "✅ [SUCCESS] Environment variables file validated"
                  echo "📋 [CONFIG] Importing variables from Airflow Secret YAML file..."
                  
                  export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" )
                  export dag_id=$(grep 'DAG_ID:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  export TARGET=$(grep 'TARGET:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  export GIT_BRANCH=$(grep 'GIT_BRANCH:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  export SOURCE_E2E_TABLESAMPLE=$(grep 'SOURCE_E2E_TABLESAMPLE:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  
                  echo "✅ [SUCCESS] Environment variables imported successfully"
                fi

                touch /workdir/data_model_e2e_data_cleanning.log

                # For dynamic DAG projects, restrict cleanup to matched DAG tags only
                CLEANUP_TAGS_ARG='{"dry_run": False}'
                DYNAMIC_DAG_VAL=$(grep 'DYNAMIC_DAG:' "${AIRFLOW_SECRET_FILE_NAME}" 2>/dev/null | tail -n1 | awk '{print $2}' | tr -d "'")
                if [[ "${DYNAMIC_DAG_VAL,,}" == "true" ]] && [ -f /workdir/matched_dags.txt ] && [ -f dynamic_dag_config.yml ]; then
                  MATCHED_DAG_NAMES=$(grep "^${folder}:" /workdir/matched_dags.txt | cut -d: -f2)
                  ALL_TAGS=""
                  for dag_name in $MATCHED_DAG_NAMES; do
                    DAG_TAGS=$(yq -r ".dags.${dag_name}.DBT_TAGS // [] | .[]" dynamic_dag_config.yml 2>/dev/null | tr '\n' ' ')
                    ALL_TAGS="${ALL_TAGS} ${DAG_TAGS}"
                  done
                  TAGS_JSON=$(echo "$ALL_TAGS" | xargs -n1 | sort -u | jq -R . | jq -sc .)
                  CLEANUP_TAGS_ARG="{\"dry_run\": false, \"tags\": ${TAGS_JSON}}"
                  echo "📋 [CONFIG] Dynamic DAG — restricting cleanup to tags: ${TAGS_JSON}"
                fi

                # ===========================================
                # 🏗️ [PLATFORM] Platform-Specific Processing
                # ===========================================
                echo "🔍 [CHECK] Detecting platform type..."
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Google Cloud Composer"
                  echo "🔍 [CHECK] Validating required Composer environment variables..."
                  
                  if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email || -z $dag_id ]]; then
                    echo "❌ [ERROR] One or more Composer environment variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All Composer variables are defined"
                    
                    # ===========================================
                    # 🧹 [CLEANUP] DBT Dataset Cleanup Process
                    # ===========================================
                    echo "⚙️ [PROCESS] Starting DBT dataset cleanup process..."
                    
                    echo "📋 [CONFIG] Setting up macro directory..."
                    macros_path=$(yq '.["macro-paths"][] // "macros"' dbt_project.yml)
                    macros_path=$(echo "$macros_path" | xargs)
                    
                    if [ -d "$macros_path" ]; then
                      echo "✅ [SUCCESS] Macro directory exists: $macros_path"
                    else
                      echo "📋 [CONFIG] Creating macro directory: $macros_path"
                      mkdir -p "$macros_path" || { echo "❌ [ERROR] Failed to create macro directory"; exit 1; }
                      
                      if [ -d "$macros_path" ]; then
                        echo "✅ [SUCCESS] Macro directory created successfully"
                      else
                        echo "❌ [ERROR] Failed to create macro directory. Please check permissions"
                        exit 1
                      fi
                    fi
                    
                    echo "📋 [CONFIG] Copying cleanup macro to project..."
                    if [ -f "/usr/app/dbt/macros/cleanup_dbt_dataset.sql" ]; then
                      cp /usr/app/dbt/macros/cleanup_dbt_dataset.sql ./"$macros_path"
                      echo "✅ [SUCCESS] Cleanup macro copied successfully"
                    else
                      echo "❌ [ERROR] Source cleanup macro file not found: /usr/app/dbt/macros/cleanup_dbt_dataset.sql"
                      exit 1
                    fi

                    echo "⚙️ [PROCESS] Executing DBT cleanup operation..."
                    if [[ ! -z "${TARGET}" ]]; then
                      echo "📋 [CONFIG] Running warehouse cleanup with target: ${TARGET}"
                      dbt run-operation cleanup_dbt_dataset --args "${CLEANUP_TAGS_ARG}" --target="${TARGET}" 2>&1 | tee -a /workdir/data_model_e2e_data_cleanning.log || true
                    else
                      echo "📋 [CONFIG] Running warehouse cleanup in dry-run mode"
                      dbt run-operation cleanup_dbt_dataset --args '{"dry_run": True}'
                    fi

                    # ===========================================
                    # 🧪 [SAMPLE] Sample Data Cleanup
                    # ===========================================
                    if [ -z "${SOURCE_E2E_TABLESAMPLE}" ] || { [ "${SOURCE_E2E_TABLESAMPLE}" != "false" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "False" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "FALSE" ]; }; then
                      echo "📋 [CONFIG] Condition evaluated to True value with SOURCE_E2E_TABLESAMPLE"
                      
                      if [ -f "/usr/app/dbt/macros/create_tablesample_source.sql" ]; then
                        cp /usr/app/dbt/macros/create_tablesample_source.sql ./"$macros_path"
                        echo "✅ [SUCCESS] Sample cleanup macro copied successfully"
                        echo "⚙️ [PROCESS] Executing sample cleanup operation..."
                        dbt run-operation delete_samples_for_dataset --target="${TARGET}" 2>&1 | tee -a /workdir/data_model_e2e_data_cleanning.log || true
                      else
                        echo "❌ [ERROR] Source sample cleanup macro file not found: /usr/app/dbt/macros/create_tablesample_source.sql"
                        exit 1
                      fi
                    else
                      echo "📋 [CONFIG] Sample cleanup skipped (SOURCE_E2E_TABLESAMPLE=false)"
                    fi
                    
                    echo "✅ [SUCCESS] DBT cleanup process completed"
                  fi
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Apache Airflow"
                  echo "🔍 [CHECK] Validating required Airflow environment variables..."
                  
                  if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD || -z $dag_id ]]; then
                    echo "❌ [ERROR] One or more Airflow environment variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All Airflow variables are defined"
                    
                    # ===========================================
                    # 🧹 [CLEANUP] DBT Dataset Cleanup Process
                    # ===========================================
                    echo "⚙️ [PROCESS] Starting DBT dataset cleanup process..."
                    
                    echo "📋 [CONFIG] Setting up macro directory..."
                    macros_path=$(yq '.["macro-paths"][] // "macros"' dbt_project.yml)
                    macros_path=$(echo "$macros_path" | xargs)
                    
                    if [ -d "$macros_path" ]; then
                      echo "✅ [SUCCESS] Macro directory exists: $macros_path"
                    else
                      echo "📋 [CONFIG] Creating macro directory: $macros_path"
                      mkdir -p "$macros_path" || { echo "❌ [ERROR] Failed to create macro directory"; exit 1; }
                      
                      if [ -d "$macros_path" ]; then
                        echo "✅ [SUCCESS] Macro directory created successfully"
                      else
                        echo "❌ [ERROR] Failed to create macro directory. Please check permissions"
                        exit 1
                      fi
                    fi
                    
                    echo "📋 [CONFIG] Copying cleanup macro to project..."
                    if [ -f "/usr/app/dbt/macros/cleanup_dbt_dataset.sql" ]; then
                      cp /usr/app/dbt/macros/cleanup_dbt_dataset.sql ./"$macros_path"
                      echo "✅ [SUCCESS] Cleanup macro copied successfully"
                    else
                      echo "❌ [ERROR] Source cleanup macro file not found: /usr/app/dbt/macros/cleanup_dbt_dataset.sql"
                      exit 1
                    fi

                    echo "⚙️ [PROCESS] Executing DBT cleanup operation..."
                    if [[ ! -z "${TARGET}" ]]; then
                      echo "📋 [CONFIG] Running warehouse cleanup with target: ${TARGET}"
                      dbt run-operation cleanup_dbt_dataset --args "${CLEANUP_TAGS_ARG}" --target="${TARGET}" 2>&1 | tee -a /workdir/data_model_e2e_data_cleanning.log || true
                    else
                      echo "📋 [CONFIG] Running warehouse cleanup in dry-run mode"
                      dbt run-operation cleanup_dbt_dataset --args '{"dry_run": True}'
                    fi

                    # ===========================================
                    # 🧪 [SAMPLE] Sample Data Cleanup
                    # ===========================================
                    if [ -z "${SOURCE_E2E_TABLESAMPLE}" ] || { [ "${SOURCE_E2E_TABLESAMPLE}" != "false" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "False" ] && [ "${SOURCE_E2E_TABLESAMPLE}" != "FALSE" ]; }; then
                      echo "📋 [CONFIG] Condition evaluated to True value with SOURCE_E2E_TABLESAMPLE"
                      
                      if [ -f "/usr/app/dbt/macros/create_tablesample_source.sql" ]; then
                        cp /usr/app/dbt/macros/create_tablesample_source.sql ./"$macros_path"
                        echo "✅ [SUCCESS] Sample cleanup macro copied successfully"
                        echo "⚙️ [PROCESS] Executing sample cleanup operation..."
                        dbt run-operation delete_samples_for_dataset --target="${TARGET}" 2>&1 | tee -a /workdir/data_model_e2e_data_cleanning.log || true
                      else
                        echo "❌ [ERROR] Source sample cleanup macro file not found: /usr/app/dbt/macros/create_tablesample_source.sql"
                        exit 1
                      fi
                    else
                      echo "📋 [CONFIG] Sample cleanup skipped (SOURCE_E2E_TABLESAMPLE=false)"
                    fi
                    
                    echo "✅ [SUCCESS] DBT cleanup process completed"
                  fi
                  
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM}"
                  exit 1
                fi
                
                cd ..
              else
                echo "📋 [CONFIG] Working on root directory - skipping"
              fi
            done < /workdir/changed_folders.txt

            # ===========================================
            # 🔍 [VALIDATION] Log Analysis & Error Check
            # ===========================================
            echo "==========================================="
            echo "🔍 [VALIDATION] Analyzing cleanup results..."
            echo "==========================================="

            error_found=0
            warning_count=0
            ignored_error_count=0

            if [ ! -f "/workdir/data_model_e2e_data_cleanning.log" ]; then
              echo "📋 [CONFIG] No changes detected - cleanup log file does not exist"
              echo "✅ [SUCCESS] Proceeding successfully without cleanup operations"
            else
              echo "📋 [CONFIG] Analyzing cleanup log file for errors and warnings..."
              
              # Read all lines into an array for lookahead processing
              mapfile -t log_lines < /workdir/data_model_e2e_data_cleanning.log
              
              for i in "${!log_lines[@]}"; do
                line="${log_lines[$i]}"
                [[ -z "$line" ]] && continue

                if echo "$line" | grep -Ei "(warning|FutureWarning|DeprecationWarning|UserWarning|RuntimeWarning|\[WARNING\]|WARN:|WARNING:|/usr/local/lib/python.*/(site-packages|dist-packages))" > /dev/null; then
                  ((warning_count++))
                  continue
                fi

                # Check for errors, but ignore "Not found" errors that are expected during cleanup
                if echo "$line" | grep -Ei "fail|error|forbidden|denied" > /dev/null; then
                  # Check if this error line contains "Not found" patterns
                  if echo "$line" | grep -Ei "not found|was not found|does not exist" > /dev/null; then
                    ((ignored_error_count++))
                    echo "📋 [CONFIG] Ignoring expected error (resource already deleted/does not exist): $line"
                    continue
                  fi
                  
                  # Check if this is a "Database Error" line and if the next line contains "Not found"
                  if echo "$line" | grep -Ei "encountered an error while running operation: database error" > /dev/null; then
                    next_line_index=$((i + 1))
                    if [ $next_line_index -lt ${#log_lines[@]} ]; then
                      next_line="${log_lines[$next_line_index]}"
                      if echo "$next_line" | grep -Ei "not found|was not found|does not exist" > /dev/null; then
                        ((ignored_error_count++))
                        echo "📋 [CONFIG] Ignoring expected error (resource already deleted/does not exist): $line"
                        echo "📋 [CONFIG] Ignoring expected error (resource already deleted/does not exist): $next_line"
                        continue
                      fi
                    fi
                  fi
                  
                  echo "❌ [ERROR] Error detected in cleanup log: $line"
                  error_found=1
                fi
              done

              if [ $warning_count -gt 0 ]; then
                echo "⚠️ [WARNING] Found $warning_count warnings in cleanup log"
              fi

              if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] DBT dataset cleanup procedure failed"
                echo "📋 [CONFIG] Please check the logs for detailed error information"
                exit 1
              else
                echo "✅ [SUCCESS] No errors found in cleanup log"
                if [ $ignored_error_count -gt 0 ]; then
                  echo "📋 [CONFIG] Summary: Processed log file with $warning_count warnings, $ignored_error_count ignored errors, and no actual errors"
                fi
              fi
            fi

            echo "==========================================="
            echo "✅ [SUCCESS] DBT Project DAG E2E Dataset Cleaning Completed"
            echo "==========================================="
        env:
          - name: DBT_TARGET
            value: "test"
          - name: DATA_WAREHOUSE_PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DATA_WAREHOUSE_PLATFORM
          - name: AIRFLOW_SECRET_FILE_NAME
