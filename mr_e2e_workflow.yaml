    - name: data-model-e2e-dag-status-check
      inputs:
        parameters:
          - name: branch
          - name: dag_run_id
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.data_orchestrator_core_image_name}}:{{workflow.parameters.data_orchestrator_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash
            # Exit on error, treat unset variables as errors, and return value of pipeline is the status of the last command


            # ===========================================
            # E2E Data-Pipeline DAG Status Check Script
            # ===========================================
            # This script checks the status of E2E Data-Pipeline DAGs for the DBT Project
            # Used in Argo Workflow for E2E Test Run validation
            # ===========================================

            echo "🚀 [INFO] Starting DBT Project DAG E2E Data-Pipeline Test procedure"
            cd /workdir/src

            # ===========================================
            # DAG Run ID Configuration
            # ===========================================
            echo "📋 [CONFIG] Configuring DAG run ID"

            # Check if dag_run_id environment variable is already set
            if [ -z "$dag_run_id" ]; then
              echo "⚙️ [PROCESS] dag_run_id not set, reading from ../dag_run_id.env file"
              
              # Check if the file exists and read the value from the file
              if [ -f "../dag_run_id.env" ]; then
                export dag_run_id=$(grep 'dag_run_id=' ../dag_run_id.env | cut -d'=' -f2)
                echo "✅ [SUCCESS] dag_run_id configured from file"
              else
                echo "❌ [ERROR] dag_run_id.env file not found!"
                exit 1
              fi
            else
              echo "✅ [SUCCESS] dag_run_id already configured"
            fi

            echo "🔍 [CHECK] DAG run ID validation complete"

            # ===========================================
            # DAG Status Check Functions
            # ===========================================

            # Function to check DAG status
            check_dag_status() {
                local platform="$1"
                local dag_id="$2"
                
                echo "🔍 [CHECK] Checking status for DAG: $dag_id"
                
                if [ "${platform,,}" == "composer" ]; then
                    echo "⚙️ [PROCESS] Platform: Composer"
                    echo "🔍 [CHECK] Validating Composer environment variables"
                    
                    if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email ]]; then
                        echo "❌ [ERROR] One or more Composer variables are undefined"
                        return 1
                    else  
                        echo "✅ [SUCCESS] All Composer variables are defined"
                        echo "⚙️ [PROCESS] Getting status for Airflow DAG: $dag_id"
                        export dag_id="$dag_id"
                        python /usr/app/tsb-data-orchestrator-core/get_dag_status_airflow_bauth.op.py 2>&1 | tee -a /workdir/status_check_dag_procedure.log || true
                    fi 
                elif [ "${platform,,}" == "airflow" ]; then
                    echo "⚙️ [PROCESS] Platform: Airflow"
                    echo "🔍 [CHECK] Validating Airflow environment variables"
                    
                    if [[ -z $AIRFLOW_URL || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD ]]; then
                        echo "❌ [ERROR] One or more Airflow variables are undefined"
                        return 1
                    else  
                        echo "✅ [SUCCESS] All Airflow variables are defined"
                        echo "⚙️ [PROCESS] Getting status for Airflow DAG: $dag_id"
                        export dag_id="$dag_id"
                        python /usr/app/tsb-data-orchestrator-core/get_dag_status_airflow_bauth.op.py 2>&1 | tee -a /workdir/status_check_dag_procedure.log || true
                    fi
                else
                    echo "❌ [ERROR] Unknown platform: $platform"
                    return 1
                fi
            }

            # Function to process DAGs for a project
            process_project_dags() {
                local project_name="$1"
                local platform="$2"
                
                echo "📋 [CONFIG] Reading DAG configurations from airflow_dags.yaml"
                
                # Get all DAG configurations for the current project
                local dag_configs=$(yq -r '.dags[] | select(.project == "'$project_name'") | .dag_id' /workdir/airflow_dags.yaml)
                
                if [ -z "$dag_configs" ]; then
                    echo "❌ [ERROR] No DAG configurations found for project $project_name in airflow_dags.yaml"
                    return 1
                fi
                
                echo "✅ [SUCCESS] Found DAG configurations for project $project_name"
                
                # Process each DAG configuration
                while IFS= read -r dag_id; do
                    if [ -n "$dag_id" ]; then
                        echo "⚙️ [PROCESS] Processing DAG: $dag_id"
                        check_dag_status "$platform" "$dag_id"
                    fi
                done <<< "$dag_configs"
            }

            # ===========================================
            # Main Processing Loop
            # ===========================================

            # Tag-based change detection: skip status check if no DAGs were triggered
            if [ -f "/workdir/matched_dags.txt" ] && grep -q "^SKIP$" "/workdir/matched_dags.txt"; then
              echo "⏭️ [SKIP] No dbt tag changes detected. Skipping DAG status check."
              exit 0
            fi

            while read folder; do
              if [ -d "$folder" ]; then
                echo "=========================================="
                echo "🔍 [CHECK] Processing Data-Orchestrator in directory: $folder"
                echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
                echo "=========================================="
                
                cd "$folder"
                
                # ===========================================
                # Data Warehouse Credentials Configuration
                # ===========================================
                echo "📋 [CONFIG] Configuring data warehouse credentials"
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                  if [[ -z "$GCP_SA_SECRET" ]]; then
                    echo "❌ [ERROR] Google BigQuery credentials are missing: Service Account JSON not provided"
                    exit 1
                  else
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "⚙️ [PROCESS] Setting up Google Cloud authentication"
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                      gcloud auth activate-service-account --key-file /secrets/sa.json
                      gcloud config set project $GCP_PROJECT_NAME
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                      echo "✅ [SUCCESS] Google Cloud authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                  if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" ]]; then
                    echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase not provided"
                    exit 1
                  else
                    if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                      echo "⚙️ [PROCESS] Setting up Snowflake authentication"
                      mkdir -p /snowsql/secrets/
                      echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8
                      chmod 600 /snowsql/secrets/rsa_key.p8
                      export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                      echo "✅ [SUCCESS] Snowflake authentication configured"
                    fi
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                  if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                    echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Redshift credentials validated"
                  fi
                fi
                
                if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                  if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                    echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                    exit 1
                  else
                    echo "✅ [SUCCESS] Fabric credentials validated"
                  fi
                fi
                
                # ===========================================
                # Data-Orchestrator Environment Configuration
                # ===========================================
                echo "🔍 [CHECK] Validating Data-Orchestrator environment variables"
                
                if [[ -z $AIRFLOW_SECRET_FILE_NAME ]]; then
                  echo "❌ [ERROR] AIRFLOW_SECRET_FILE_NAME is undefined"
                  exit 1
                else
                  echo "✅ [SUCCESS] All Data-Orchestrator variables are defined"
                  echo "⚙️ [PROCESS] Importing variables from Airflow Secret yml file"
                  export PLATFORM=$(grep -E '^[[:space:]]*PLATFORM:[[:space:]]*' $AIRFLOW_SECRET_FILE_NAME | awk '{print $2}' | tr -d "'" )
                  export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' $AIRFLOW_SECRET_FILE_NAME | tail -n1 | awk '{print $2}' | tr -d "'" )
                  echo "✅ [SUCCESS] Platform and DBT project name imported"
                fi

                touch /workdir/status_check_dag_procedure.log

                # Process DAGs for the current project
                process_project_dags "$DBT_PROJECT_NAME" "$PLATFORM"
                
                cd ..
              else
                echo "⚠️ [WARNING] Working on root - skipping directory processing"
              fi
            done < /workdir/changed_folders.txt

            # ===========================================
            # Error Analysis and Final Status
            # ===========================================
            echo "=========================================="
            echo "🔍 [CHECK] Analyzing E2E test results"
            echo "=========================================="

            error_found=0

            if [ ! -f "/workdir/status_check_dag_procedure.log" ]; then
                echo "✅ [SUCCESS] No changes detected - status check log file does not exist"
                echo "✅ [SUCCESS] E2E test procedure completed successfully"
            else
                echo "⚙️ [PROCESS] Analyzing status check log for errors"
                
                while read -r line; do
                  if echo "$line" | grep -Ei "fail|error|forbidden|denied" > /dev/null; then
                    echo "❌ [ERROR] Error found in E2E test procedure: $line"
                    error_found=1
                  fi
                done < /workdir/status_check_dag_procedure.log

                if [ $error_found -eq 1 ]; then
                  echo "❌ [ERROR] E2E test procedure failed. Please check the logs for details"
                  exit 1
                else
                  echo "✅ [SUCCESS] E2E test procedure completed successfully"
                fi
            fi

            echo "=========================================="
            echo "🎉 [COMPLETE] DBT Project DAG E2E Data-Pipeline Test procedure finished"
            echo "=========================================="
        env:
