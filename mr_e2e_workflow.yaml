    - name: data-model-e2e-data-orchestration-cleanup
      inputs:
        parameters:
          - name: branch
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.data_orchestrator_core_image_name}}:{{workflow.parameters.data_orchestrator_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash
            # Exit on error, treat unset variables as errors, and return value of pipeline is the status of the last command


            echo "==========================================="
            echo "🚀 [INFO] DBT Project DAG E2E Data-Orchestrator Cleanup"
            echo "==========================================="

            cd /workdir/src || { echo "❌ [ERROR] Failed to change to /workdir/src"; exit 1; }

            echo "⚙️ [PROCESS] Starting cleanup procedures..."

            # ===========================================
            # MANIFEST CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing Manifest Files"
            echo "==========================================="

            if [[ -f "/workdir/compile_manifest_path.log" && -s "/workdir/compile_manifest_path.log" ]]; then
              echo "⚙️ [PROCESS] Processing manifest files..."
              for n in $(cat /workdir/compile_manifest_path.log); do
                IFS="=" read -r platform manifest_path <<< "$n"
                ## TODO: Temporary set - UpperCase ${PLATFORM,,}
                echo "🔍 [CHECK] Processing platform: ${PLATFORM,,}"
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                    echo "⚙️ [PROCESS] Setting up GCP credentials..."
                    echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                    gcloud auth activate-service-account --key-file /secrets/sa.json
                    gcloud config set project $GCP_PROJECT_NAME
                    export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                  fi
                  
                  echo "🔍 [CHECK] Validating required environment variables..."
                  if [[ -z $GCP_BUCKET_NAME ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting manifest file from Composer GCS Bucket"
                    gsutil rm -f ${manifest_path} || { echo "❌ [ERROR] Failed to delete manifest file"; exit 1; }
                    echo "✅ [SUCCESS] Manifest file deletion completed"
                  fi
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating required environment variables..."
                  if [[ -z ${GIT_USER_EMAIL} || -z ${GIT_USER_NAME} || -z ${DAG_REPO_PUSH} ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else
                    echo "✅ [SUCCESS] All variables are defined"
                    
                    echo "⚙️ [PROCESS] Setting up SSH keys..."
                    export GIT_SSH_COMMAND="ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                    echo "⚙️ [PROCESS] Setting up git configuration..."
                    git config --global user.email "${GIT_USER_EMAIL}"
                    git config --global user.name "${GIT_USER_NAME}"
                    
                    REPO_DIR="/workdir/airflow-dags"
                    if [ ! -d "$REPO_DIR" ]; then
                      echo "📋 [CONFIG] Repository directory does not exist - creating"
                    else
                      echo "⚙️ [PROCESS] Removing existing repository directory"
                      rm -fr $REPO_DIR
                    fi

                    echo "⚙️ [PROCESS] Cloning Airflow dags repository..."
                    git clone $DAG_REPO_PUSH $REPO_DIR || { echo "❌ [ERROR] Failed to clone repository"; exit 1; }
                    
                    echo "⚙️ [PROCESS] Deleting manifest file from Airflow repo"
                    rm -rf ${manifest_path}
                    echo "✅ [SUCCESS] Manifest file deletion completed"
                    
                    echo "⚙️ [PROCESS] Committing and pushing changes..."
                    git -C "$REPO_DIR" add -A
                    git -C "$REPO_DIR" commit -am"Delete DBT Project Manifest file."
                    git -C "$REPO_DIR" remote set-url --push origin "${DAG_REPO_PUSH}" 
                    git -C "$REPO_DIR" push || true
                    sleep 5
                    echo "✅ [SUCCESS] Changes committed and pushed"
                  fi
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM,,}"
                  exit 1
                fi
              done
            else
              echo "⚠️ [WARNING] Manifest cleanup log not found or empty - skipping"
            fi

            # ===========================================
            # BASH OPERATOR CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing Bash Operator Files"
            echo "==========================================="

            if [[ -f "/workdir/bash_operator_files_path.log" ]]; then
              if [[ -s "/workdir/bash_operator_files_path.log" ]]; then
                echo "⚙️ [PROCESS] Processing bash operator files..."
                while IFS= read -r n || [[ -n "$n" ]]; do
                  if [[ -z "$n" ]]; then
                    continue
                  fi

                  IFS="=" read -r operator file_path <<< "$n"
                  
                  if [[ -z "$operator" || -z "$file_path" ]]; then
                    echo "⚠️ [WARNING] Invalid line format in bash operator log"
                    continue
                  fi

                  echo "⚙️ [PROCESS] Processing deletion for operator: ${operator}"
                  
                  if [[ "${PLATFORM,,}" == "composer" ]]; then
                    echo "📋 [CONFIG] Platform: Composer"
                    if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                      echo "⚙️ [PROCESS] Setting up GCP credentials..."
                      echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                      gcloud auth activate-service-account --key-file /secrets/sa.json
                      gcloud config set project $GCP_PROJECT_NAME
                      export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                    fi
                    
                    if [[ -z $GCP_BUCKET_NAME ]]; then
                      echo "❌ [ERROR] GCP_BUCKET_NAME is undefined"
                      exit 1
                    else
                      echo "✅ [SUCCESS] All required variables are defined"
                      echo "⚙️ [PROCESS] Deleting files from Composer GCS Bucket"
                      if gsutil rm -rf "${file_path}" 2>/dev/null; then
                        echo "✅ [SUCCESS] Deletion completed"
                      else
                        echo "⚠️ [WARNING] Failed to delete or path not found"
                      fi
                    fi
                    
                  elif [[ "${PLATFORM,,}" == "airflow" ]]; then
                    echo "📋 [CONFIG] Platform: Airflow"
                    if [[ -z ${GIT_USER_EMAIL} || -z ${GIT_USER_NAME} || -z ${DAG_REPO_PUSH} ]]; then
                      echo "❌ [ERROR] Required variables are undefined"
                      exit 1
                    else
                      echo "✅ [SUCCESS] All required variables are defined"
                    
                      echo "⚙️ [PROCESS] Setting up SSH keys..."
                      export GIT_SSH_COMMAND="ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                      echo "⚙️ [PROCESS] Configuring git..."
                      git config --global user.email "${GIT_USER_EMAIL}"
                      git config --global user.name "${GIT_USER_NAME}"
                      
                      REPO_DIR="/workdir/airflow-dags/"
                      if [[ -d "$REPO_DIR" ]]; then
                        echo "⚙️ [PROCESS] Removing existing repository directory..."
                        rm -rf "$REPO_DIR"
                      fi
                      
                      echo "⚙️ [PROCESS] Cloning Airflow dags repository..."
                      if ! git clone "$DAG_REPO_PUSH" "$REPO_DIR"; then
                        echo "❌ [ERROR] Failed to clone repository"
                        exit 1
                      fi
                      
                      echo "⚙️ [PROCESS] Deleting files from Airflow repo"
                      if [[ -e "${file_path}" ]]; then
                        rm -rf "${file_path}"
                        echo "✅ [SUCCESS] Deletion completed"
                        
                        echo "⚙️ [PROCESS] Committing and pushing changes..."
                        git -C "$REPO_DIR" add -A
                        if git -C "$REPO_DIR" diff --cached --quiet; then
                          echo "📋 [CONFIG] No changes to commit"
                        else
                          git -C "$REPO_DIR" commit -am "Delete DBT Project files for bash operator"
                          git -C "$REPO_DIR" remote set-url --push origin "${DAG_REPO_PUSH}"
                          git -C "$REPO_DIR" push || true
                          sleep 5
                          echo "✅ [SUCCESS] Changes committed and pushed"
                        fi
                      else
                        echo "⚠️ [WARNING] Path not found: ${file_path}"
                      fi
                    fi
                    
                  else
                    echo "❌ [ERROR] Unknown platform"
                    exit 1
                  fi
                done < "/workdir/bash_operator_files_path.log"
              else
                echo "⚠️ [WARNING] Bash operator log file is empty - nothing to delete"
              fi
            else
              echo "⚠️ [WARNING] Bash operator log file not found - nothing to delete"
            fi

            # ===========================================
            # DAG CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing DAG Files"
            echo "==========================================="

            echo "⚙️ [PROCESS] Starting DAGs deletion procedure..."

            if [[ -f "/workdir/compile_dag_path.log" && -s "/workdir/compile_dag_path.log" ]]; then
              echo "⚙️ [PROCESS] Processing DAG files..."
              for n in $(cat /workdir/compile_dag_path.log); do
                IFS="=" read -r platform dag_path <<< "$n"
                echo "🔍 [CHECK] Processing platform: ${PLATFORM,,}"
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                    echo "⚙️ [PROCESS] Setting up GCP credentials..."
                    echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                    gcloud auth activate-service-account --key-file /secrets/sa.json
                    gcloud config set project $GCP_PROJECT_NAME
                    export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                  fi
                  
                  echo "🔍 [CHECK] Validating required environment variables..."
                  if [[ -z $GCP_BUCKET_NAME ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting DAG file from Composer GCS Bucket"
                    gsutil rm -f ${dag_path} || { echo "❌ [ERROR] Failed to delete DAG file"; exit 1; }
                    echo "✅ [SUCCESS] DAG file deletion completed"
                  fi
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating required environment variables..."
                  if [[ -z ${GIT_USER_EMAIL} || -z ${GIT_USER_NAME} || -z ${DAG_REPO_PUSH} ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else
                    echo "✅ [SUCCESS] All variables are defined"

                    echo "⚙️ [PROCESS] Setting up SSH keys..."
                    export GIT_SSH_COMMAND="ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                    echo "⚙️ [PROCESS] Setting up git configuration..."
                    git config --global user.email "${GIT_USER_EMAIL}"
                    git config --global user.name "${GIT_USER_NAME}"
                    
                    REPO_DIR="/workdir/airflow-dags"
                    if [ ! -d "$REPO_DIR" ]; then
                      echo "📋 [CONFIG] Repository directory does not exist - creating"
                    else
                      echo "⚙️ [PROCESS] Removing existing repository directory"
                      rm -fr $REPO_DIR
                    fi
                    
                    echo "⚙️ [PROCESS] Cloning Airflow dags repository..."
                    git clone $DAG_REPO_PUSH $REPO_DIR || { echo "❌ [ERROR] Failed to clone repository"; exit 1; }
                    
                    echo "⚙️ [PROCESS] Deleting DAG file from Airflow repo"
                    rm -rf ${dag_path}
                    echo "✅ [SUCCESS] DAG file deletion completed"
                    
                    echo "⚙️ [PROCESS] Committing and pushing changes..."
                    git -C "$REPO_DIR" add -A
                    git -C "$REPO_DIR" commit -am"Delete DBT Project DAG file."
                    git -C "$REPO_DIR" remote set-url --push origin "${DAG_REPO_PUSH}" 
                    git -C "$REPO_DIR" push || true
                    sleep 5
                    echo "✅ [SUCCESS] Changes committed and pushed"
                  fi
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM,,}"
                  exit 1
                fi
              done
            else
              echo "⚠️ [WARNING] DAG cleanup log not found or empty - skipping"
            fi

            # ===========================================
            # DBT API SERVER CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing DBT API Server"
            echo "==========================================="

            if [ -f "/workdir/deploy_dbt_api_parameters.log" ]; then
              echo "⚙️ [PROCESS] Processing DBT API parameters..."
              while IFS='=' read -r key value; do
                case "$key" in
                "DAG_OPERATOR")
                  export DAG_OPERATOR="$value"
                  echo "📋 [CONFIG] DAG_OPERATOR: $DAG_OPERATOR"
                  if [[ "$DAG_OPERATOR" == "api" ]]; then
                    echo "✅ [SUCCESS] DBT API Server is enabled"
                  else
                    echo "📋 [CONFIG] DBT API Server is disabled"
                  fi
                  ;;
                "DBT_WORKLOAD_API_RELEASE")
                  export DBT_WORKLOAD_API_RELEASE="$value"
                  ;;
                "DBT_WORKLOAD_API_CONNECTION_ID")
                  export DBT_WORKLOAD_API_CONNECTION_ID="$value"
                  ;;
                esac
              done < /workdir/deploy_dbt_api_parameters.log
              
              if [[ "$DAG_OPERATOR" == "api" ]]; then
                echo "⚙️ [PROCESS] Deleting DBT API service..."
                /bin/bash -c "/usr/app/tsb-data-orchestrator-core/delete_dbt_api_service.sh" || { echo "❌ [ERROR] Failed to delete DBT API service"; exit 1; }
                echo "✅ [SUCCESS] DBT API service deletion completed"
              fi
            else
              echo "⚠️ [WARNING] DBT API parameters log not found - skipping cleanup"
            fi

            # ===========================================
            # AIRFLOW VARIABLES CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing Airflow Variables"
            echo "==========================================="

            echo "⚙️ [PROCESS] Starting Airflow variables deletion procedure..."

            if [ -f "/workdir/airflow_secrets.yaml" ]; then
              echo "✅ [SUCCESS] Airflow secrets configuration found"
              
              echo "⚙️ [PROCESS] Extracting secret values from airflow_secrets.yaml"
              mapfile -t secret_values < <(yq -r ".secrets.platform.\"${PLATFORM,,}\"[]" /workdir/airflow_secrets.yaml)
              echo "📋 [CONFIG] Found ${#secret_values[@]} secret values to process for platform: ${PLATFORM,,}"
              
              for secret_value in "${secret_values[@]}"; do
                if [ -z "$secret_value" ]; then
                  echo "⚠️ [WARNING] Skipping empty secret value"
                  continue
                fi
                
                echo "⚙️ [PROCESS] Processing secret value"
                export variable_secret_key="$secret_value"
                
                echo "🔍 [CHECK] Validating environment variables..."
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                    echo "⚙️ [PROCESS] Setting up GCP credentials..."
                    echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                    gcloud auth activate-service-account --key-file /secrets/sa.json
                    gcloud config set project $GCP_PROJECT_NAME
                    export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                  fi
                  
                  echo "🔍 [CHECK] Validating required Composer environment variables..."
                  if [[ -z $AIRFLOW_URL || -z $AIRFLOW_SECRET_FILE_NAME || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting secrets from Airflow/Composer vault"
                    python /usr/app/tsb-data-orchestrator-core/delete_variables_airflow_bauth.op.py || { echo "❌ [ERROR] Failed to delete variables"; exit 1; }
                    echo "✅ [SUCCESS] Variables deletion completed"
                  fi 
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating required Airflow environment variables..."
                  if [[ -z $AIRFLOW_URL || -z $AIRFLOW_SECRET_FILE_NAME || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting secrets from Airflow vault"
                    python /usr/app/tsb-data-orchestrator-core/delete_variables_airflow_bauth.op.py || { echo "❌ [ERROR] Failed to delete variables"; exit 1; }
                    echo "✅ [SUCCESS] Variables deletion completed"
                  fi
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM,,}"
                  exit 1
                fi
              done
            else
              echo "⚠️ [WARNING] Airflow secrets configuration not found"
            fi

            # ===========================================
            # AIRFLOW DAGS CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Processing Airflow DAGs"
            echo "==========================================="

            echo "⚙️ [PROCESS] Starting DAG deletion procedure..."

            if [ -f "/workdir/airflow_dags.yaml" ]; then
              echo "✅ [SUCCESS] Airflow DAGs configuration found"
              
              echo "⚙️ [PROCESS] Extracting DAG IDs from airflow_dags.yaml"
              mapfile -t dag_ids < <(yq -r '.dags[].dag_id' /workdir/airflow_dags.yaml)
              echo "📋 [CONFIG] Found ${#dag_ids[@]} DAG IDs to process"
              
              for dag_id in "${dag_ids[@]}"; do
                if [ -z "$dag_id" ]; then
                  echo "⚠️ [WARNING] Skipping empty DAG ID"
                  continue
                fi
                
                echo "⚙️ [PROCESS] Processing DAG ID: $dag_id"
                export dag_id="$dag_id"
                
                echo "🔍 [CHECK] Validating environment variables..."
                
                if [ "${PLATFORM,,}" == "composer" ]; then
                  echo "📋 [CONFIG] Platform: Composer"
                  if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                    echo "⚙️ [PROCESS] Setting up GCP credentials..."
                    echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json
                    gcloud auth activate-service-account --key-file /secrets/sa.json
                    gcloud config set project $GCP_PROJECT_NAME
                    export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                  fi
                  
                  echo "🔍 [CHECK] Validating required Composer environment variables..."
                  if [[ -z $AIRFLOW_URL || -z $AIRFLOW_SECRET_FILE_NAME || -z $PLATFORM || -z $project_id || -z $location || -z $composer_environment_name || -z $service_account_email ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting DAG from Airflow/Composer"
                    python /usr/app/tsb-data-orchestrator-core/delete_dag_airflow_bauth.op.py || { echo "❌ [ERROR] Failed to delete DAG"; exit 1; }
                    echo "✅ [SUCCESS] DAG deletion completed"
                  fi 
                  
                elif [ "${PLATFORM,,}" == "airflow" ]; then
                  echo "📋 [CONFIG] Platform: Airflow"
                  echo "🔍 [CHECK] Validating required Airflow environment variables..."
                  if [[ -z $AIRFLOW_URL || -z $AIRFLOW_SECRET_FILE_NAME || -z $PLATFORM || -z $AIRFLOW_USER || -z $AIRFLOW_PASSWORD ]]; then
                    echo "❌ [ERROR] Required variables are undefined"
                    exit 1
                  else  
                    echo "✅ [SUCCESS] All variables are defined"
                    echo "⚙️ [PROCESS] Deleting DAG from Airflow"
                    python /usr/app/tsb-data-orchestrator-core/delete_dag_airflow_bauth.op.py || { echo "❌ [ERROR] Failed to delete DAG"; exit 1; }
                    echo "✅ [SUCCESS] DAG deletion completed"
                  fi
                else
                  echo "❌ [ERROR] Unknown platform: ${PLATFORM,,}"
                  exit 1
                fi
              done
            else
              echo "⚠️ [WARNING] Airflow DAGs configuration not found"
            fi

            # ===========================================
            # CLEANUP SECTION
            # ===========================================
            echo "==========================================="
            echo "📋 [CONFIG] Final Cleanup"
            echo "==========================================="

            if [ -f "/workdir/airflow_secrets.yaml" ]; then
              echo "⚙️ [PROCESS] Cleaning up airflow_secrets.yaml"
              rm -f /workdir/airflow_secrets.yaml
              echo "✅ [SUCCESS] airflow_secrets.yaml removed"
            fi

            if [ -f "/workdir/airflow_dags.yaml" ]; then
              echo "⚙️ [PROCESS] Cleaning up airflow_dags.yaml"
              rm -f /workdir/airflow_dags.yaml
              echo "✅ [SUCCESS] airflow_dags.yaml removed"
            fi

            echo "==========================================="
            echo "✅ [SUCCESS] DBT Project DAG E2E Data-Orchestrator cleanup completed"
            echo "==========================================="
        env:
