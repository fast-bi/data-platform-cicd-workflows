apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: fastbi-mr-e2e-workflow-
spec:
  templates:
    - name: exit-handler
      inputs: {}
      outputs: {}
      metadata: {}
      steps:
        - - name: check-all-task-status
            template: check-task-status
            arguments:
              parameters:
                - name: workflow_status
                  value: '{{workflow.failures}}'
                - name: argo_main_address
                  value: '{{workflow.parameters.argo_main_address}}'
          - name: k8s-pvc-cleanup
            template: k8s-pvc-cleanup
            arguments: {}
            when: >-
              {{workflow.status}} != Succeeded
    - name: main
      inputs:
        parameters:
          - name: repo_url
          - name: revision
          - name: branch
          - name: commit_short_sha
          - name: git_username
          - name: git_token
          - name: target_branch
          - name: ci_job_id
          - name: e2e_mode_empty
          - name: extra_e2e_pool
          - name: dbt_model_sharding
          - name: dbt_model
      outputs: {}
      metadata: {}
      steps:
        - - name: checkout
            template: checkout
            arguments:
              parameters:
                - name: repo_url
                  value: '{{inputs.parameters.repo_url}}'
                - name: revision
                  value: '{{inputs.parameters.revision}}'
                - name: git_username
                  value: '{{inputs.parameters.git_username}}'
                - name: git_token
                  value: '{{inputs.parameters.git_token}}'
        - - name: detect-changes
            template: detect-changes
            arguments:
              parameters:
                - name: revision
                  value: '{{inputs.parameters.revision}}'
                - name: target_branch
                  value: '{{inputs.parameters.target_branch}}'
        - - name: lint-yaml-e2e
            template: lint-yaml-e2e
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
        - - name: detect-changed-dbt-tags
            template: detect-changed-dbt-tags
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
        - - name: data-orchestration-variables-import-e2e
            template: data-orchestration-variables-import-e2e
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
                - name: target_branch
                  value: '{{inputs.parameters.target_branch}}'
                - name: repo_url
                  value: '{{inputs.parameters.repo_url}}'
                - name: e2e_mode_empty
                  value: '{{inputs.parameters.e2e_mode_empty}}'
                - name: extra_e2e_pool
                  value: '{{inputs.parameters.extra_e2e_pool}}'
                - name: dbt_model_sharding
                  value: '{{inputs.parameters.dbt_model_sharding}}'
                - name: dbt_model
                  value: '{{inputs.parameters.dbt_model}}'
        - - name: compile-dbt-manifest-e2e
            template: compile-dbt-manifest-e2e
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
        - - name: compile-dag-e2e
            template: compile-dag-e2e
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
                - name: ci_job_id
                  value: '{{inputs.parameters.ci_job_id}}'
                - name: target_branch
                  value: '{{inputs.parameters.target_branch}}'
        - - name: data-model-e2e-dag-run-trigger
            template: data-model-e2e-dag-run-trigger
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
        - - name: data-model-e2e-dag-status-check
            template: data-model-e2e-dag-status-check
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: dag_run_id
                  value: '{{steps.data-model-e2e-dag-run-trigger.outputs.parameters.dag_run_id}}'
            continueOn:
              failed: true
        - - name: validating-da-dependencies-e2e
            template: validating-da-dependencies-e2e
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
            when: "{{workflow.parameters.da_dependencies_import}} == True"
        - - name: data-model-e2e-data-tagging
            template: data-model-e2e-data-tagging
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
            when: "{{workflow.parameters.e2e_data_tagging}} == True"
        - - name: data-model-e2e-data-cleanning
            template: data-model-e2e-data-cleanning
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
            when: "{{steps.data-model-e2e-dag-status-check.status}} == Succeeded"
          - name: data-model-e2e-data-orchestration-cleanup
            template: data-model-e2e-data-orchestration-cleanup
            arguments:
              parameters:
                - name: branch
                  value: '{{inputs.parameters.branch}}'
                - name: commit_short_sha
                  value: '{{inputs.parameters.commit_short_sha}}'
            when: "{{steps.data-model-e2e-dag-status-check.status}} == Succeeded"
        - - name: k8s-pvc-cleanup
            template: k8s-pvc-cleanup
            arguments: {}
            when: >-
              {{workflow.status}} != Succeeded || {{workflow.status}} ==
              Succeeded
    - name: checkout
      inputs:
        parameters:
          - name: repo_url
          - name: revision
          - name: git_username
          - name: git_token
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: alpine/git
        command:
          - sh
          - '-c'
        args:
          - >
            #!/bin/sh


            # ===========================================
            # 🚀 Repository Checkout Script
            # ===========================================


            echo "==========================================="
            echo "🚀 [INFO] Starting repository checkout process"
            echo "==========================================="

            # ===========================================
            # 📋 [CONFIG] System Setup
            # ===========================================

            echo "⚙️ [PROCESS] Installing required packages..."

            apk add --no-cache jq || { echo "❌ [ERROR] Failed to install jq package"; exit 1; }

            # ===========================================
            # 🔍 [CHECK] Environment Validation
            # ===========================================

            echo "🔍 [CHECK] Validating repository configuration..."

            REPO_URL="{{inputs.parameters.repo_url}}"
            REPO_URL_NO_PROTOCOL="${REPO_URL#https://}"

            echo "📋 [CONFIG] Repository URL configured: ${REPO_URL%/*}/[REPO_NAME]"

            # ===========================================
            # ⚙️ [PROCESS] Git Configuration
            # ===========================================

            echo "⚙️ [PROCESS] Configuring git settings..."

            git config --global advice.detachedHead false || { echo "❌ [ERROR] Failed to configure global git settings"; exit 1; }

            # ===========================================
            # 🚀 [INFO] Repository Operations
            # ===========================================

            echo "🚀 [INFO] Cloning repository..."

            git clone https://{{inputs.parameters.git_username}}:{{inputs.parameters.git_token}}@${REPO_URL_NO_PROTOCOL} /workdir/src || { echo "❌ [ERROR] Failed to clone repository"; exit 1; }

            echo "⚙️ [PROCESS] Navigating to repository directory..."

            cd /workdir/src || { echo "❌ [ERROR] Failed to navigate to repository directory"; exit 1; }

            echo "⚙️ [PROCESS] Configuring local git settings..."

            git config advice.detachedHead false || { echo "❌ [ERROR] Failed to configure local git settings"; exit 1; }

            echo "⚙️ [PROCESS] Checking out specified revision..."

            git checkout {{inputs.parameters.revision}} || { echo "❌ [ERROR] Failed to checkout revision {{inputs.parameters.revision}}"; exit 1; }

            # ===========================================
            # ✅ [SUCCESS] Completion
            # ===========================================

            echo "==========================================="

            echo "✅ [SUCCESS] Repository cloned and checked out successfully"
            
            echo "📋 [INFO] Working directory: /workdir/src"
            
            echo "📋 [INFO] Revision: {{inputs.parameters.revision}}"
            
            echo "==========================================="
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
    - name: detect-changes
      inputs:
        parameters:
          - name: revision
          - name: target_branch
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: alpine/git
        command:
          - sh
          - '-c'
        args:
          - |
            #!/bin/sh

            # ===========================================
            # Git Change Detection Script
            # Detects changed folders between Git branches
            # ===========================================


            echo "🚀 [INFO] Starting Git change detection process"
            echo "=========================================="

            # ===========================================
            # Environment Setup
            # ===========================================

            echo "📋 [CONFIG] Setting up working directory"
            cd /workdir/src || { echo "❌ [ERROR] Failed to change to /workdir/src directory"; exit 1; }

            # ===========================================
            # Git Operations
            # ===========================================

            echo "⚙️ [PROCESS] Fetching latest changes from remote repository"
            git fetch --all || { echo "❌ [ERROR] Failed to fetch from remote repository"; exit 1; }

            echo "⚙️ [PROCESS] Analyzing changes between branches"
            echo "🔍 [CHECK] Comparing {{inputs.parameters.target_branch}} with {{inputs.parameters.revision}}"

            git diff --name-only remotes/origin/{{inputs.parameters.target_branch}}...{{inputs.parameters.revision}} \
              | grep -v '/dbt_packages/' \
              | cut -d'/' -f1 \
              | sort \
              | uniq > /workdir/changed_folders.txt || { echo "❌ [ERROR] Failed to identify changed folders"; exit 1; }

            echo "⚙️ [PROCESS] Capturing full changed file paths..."
            git diff --name-only remotes/origin/{{inputs.parameters.target_branch}}...{{inputs.parameters.revision}} \
              | grep -v '^\.' \
              | grep -v '/dbt_packages/' > /workdir/changed_files.txt || true
            if [ ! -s /workdir/changed_files.txt ]; then
              echo "" > /workdir/changed_files.txt
            fi
            echo "📋 [CONFIG] Changed files count: $(wc -l < /workdir/changed_files.txt)"

            # ===========================================
            # Filter Hidden Folders
            # ===========================================

            echo "⚙️ [PROCESS] Filtering out hidden folders and files"

            > /workdir/temp.txt
            while read -r line; do
              # Remove leading whitespace (if any)
              line=$(echo "$line" | sed 's/^[ \t]*//')
              # Get the first character
              first_char=$(echo "$line" | cut -c1)
              if [ "$first_char" != "." ]; then
                echo "$line" >> /workdir/temp.txt
              fi
            done < /workdir/changed_folders.txt

            mv /workdir/temp.txt /workdir/changed_folders.txt

            # ===========================================
            # Fallback Configuration
            # ===========================================

            if [ ! -s /workdir/changed_folders.txt ]; then
              echo "⚠️ [WARNING] No changed folders detected, using default fallback"
              echo "README.md" > /workdir/changed_folders.txt
            fi

            # ===========================================
            # Results Summary
            # ===========================================

            echo "✅ [SUCCESS] Change detection completed successfully"
            echo "📋 Folders changed: $(cat /workdir/changed_folders.txt)"
            echo "📋 [CONFIG] Changed folders identified:"
            echo "=========================================="

            # Display count of changed folders instead of full content for security
            folder_count=$(wc -l < /workdir/changed_folders.txt)
            echo "🔍 [CHECK] Total changed folders detected: $folder_count"

            echo "✅ [SUCCESS] Git change detection process completed"
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
    - name: lint-yaml-e2e
      inputs:
        parameters:
          - name: branch
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: cytopia/yamllint
        command:
          - sh
          - '-c'
        args:
          - |
            #!/bin/bash

            # =============================================================================
            # DBT YAML File Linting Script for E2E Environment
            # =============================================================================



            echo "🚀 [INFO] ==========================================="
            echo "🚀 [INFO] Starting DBT YML File Linting Procedure"
            echo "🚀 [INFO] Branch: {{inputs.parameters.branch}}"
            echo "🚀 [INFO] Environment: E2E"
            echo "🚀 [INFO] ==========================================="

            # =============================================================================
            # INITIALIZATION & VALIDATION
            # =============================================================================

            echo "📋 [CONFIG] Changing to source directory"
            cd /workdir/src || { echo "❌ [ERROR] Failed to change to source directory"; exit 1; }

            # =============================================================================
            # CHANGED FOLDERS PROCESSING
            # =============================================================================

            echo "🔍 [CHECK] Validating changed folders file"
            if [ -f /workdir/changed_folders.txt ]; then
              echo "✅ [SUCCESS] Changed folders file found - proceeding with YAML linting"
              
              echo "⚙️ [PROCESS] Scanning YAML files in changed folders"
              while read -r folder; do
                if [ -d "$folder" ]; then
                  echo "⚙️ [PROCESS] Linting YAML in folder: $folder"
                  cd "$folder" || { echo "❌ [ERROR] Failed to change to folder: $folder"; exit 1; }
                  yamllint -c yamllint-config.yaml -f colored --no-warnings . 2>&1 | tee -a ../yamllint_lint.log || true
                  cd .. || { echo "❌ [ERROR] Failed to return to parent directory"; exit 1; }
                else
                  echo "⚠️ [WARNING] Skipping root directory processing"
                fi
              done < /workdir/changed_folders.txt
            else
              echo "⚠️ [WARNING] No changed folders file found - skipping linting step"
            fi

            # =============================================================================
            # YAML LINT LOG ANALYSIS
            # =============================================================================

            echo "🔍 [CHECK] Analyzing YAML lint results"
            if [ -f ./yamllint_lint.log ]; then
              echo "📋 [CONFIG] YAML lint log file found - checking for errors"
              
              echo "⚙️ [PROCESS] Scanning log file for error patterns"
              while read -r line; do
                echo "${line}" | grep -i "error" > /dev/null
                if [ $? -eq 0 ]; then
                  echo "❌ [ERROR] YAML linting error detected in log file"
                  echo "❌ [ERROR] Error line: ${line}"
                  echo "❌ [ERROR] YAML linting failed - exiting with error code 1"
                  sleep 5
                  exit 1
                fi
              done < ./yamllint_lint.log
              
              echo "✅ [SUCCESS] No errors found in YAML lint log"
            else
              echo "📋 [CONFIG] No YAML lint log file found - no errors to report"
            fi

            # =============================================================================
            # COMPLETION
            # =============================================================================

            echo "✅ [SUCCESS] ==========================================="
            echo "✅ [SUCCESS] DBT YML File Linting Procedure Completed"
            echo "✅ [SUCCESS] All YAML files validated successfully"
            echo "✅ [SUCCESS] ==========================================="
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
    - name: detect-changed-dbt-tags
      inputs:
        parameters:
          - name: branch
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.dbt_workflow_core_image_name}}:{{workflow.parameters.dbt_workflow_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash

            echo "==========================================="
            echo "🚀 [INFO] DBT Tag-Based Change Detection"
            echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
            echo "==========================================="

            branch_name="{{inputs.parameters.branch}}"
            if [[ "$branch_name" =~ [^a-zA-Z0-9_] ]]; then
              new_branch_name=$(echo "$branch_name" | sed 's/[^a-zA-Z0-9_]/_/g')
              echo "⚠️ [WARNING] Branch name contains symbols. Changing branch name to: ${new_branch_name}"
              branch_name="${new_branch_name}"
            fi
            export BRANCH_NAME="${branch_name}"

            cd /workdir/src

            python3 << 'PYEOF'
            import json
            import os
            import re
            import subprocess
            import sys

            try:
                import yaml
            except ImportError:
                subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'pyyaml', '-q'])
                import yaml

            CHANGED_FILES_PATH  = '/workdir/changed_files.txt'
            CHANGED_FOLDERS_PATH = '/workdir/changed_folders.txt'
            MATCHED_DAGS_PATH   = '/workdir/matched_dags.txt'
            SRC_DIR             = '/workdir/src'
            COMPILE_DBT_LOG     = '/workdir/compile_dbt_project_manifest.log'
            AIRFLOW_SECRET_FILE_NAME = os.environ.get('AIRFLOW_SECRET_FILE_NAME', 'dbt_airflow_variables.yml')
            STRUCTURAL_FILES    = {'dynamic_dag_config.yml', 'dbt_project.yml', AIRFLOW_SECRET_FILE_NAME}
            BRANCH_NAME = os.environ.get('BRANCH_NAME', '').strip()

            def read_lines(path):
                if not os.path.exists(path):
                    return []
                with open(path) as f:
                    return [l.strip() for l in f if l.strip()]

            def write_matched(matched):
                with open(MATCHED_DAGS_PATH, 'w') as f:
                    if matched:
                        f.write('\n'.join(matched) + '\n')
                    else:
                        f.write('SKIP\n')

            def dbt_target_from_airflow_vars(airflow_vars_path):
                t = os.environ.get('TARGET', '').strip()
                if t:
                    return t
                if not os.path.exists(airflow_vars_path):
                    return ''
                last = None
                with open(airflow_vars_path) as f:
                    for line in f:
                        if 'TARGET:' in line:
                            rest = line.split('TARGET:', 1)[1].strip()
                            last = rest.strip().strip("'\"")
                return last or ''

            def update_git_branch_in_airflow_vars(airflow_vars_path, branch_name):
                """Mirror shell sed/git grep: set GIT_BRANCH in project airflow vars before dbt parse."""
                print('⚙️ [PROCESS] Updating GIT_BRANCH...')
                if not branch_name:
                    print('⚠️ [WARNING] BRANCH_NAME empty - skipping GIT_BRANCH update')
                    return
                if not os.path.exists(airflow_vars_path):
                    print('⚠️ [WARNING] %s not found - skipping GIT_BRANCH update' % airflow_vars_path)
                    return
                with open(airflow_vars_path, 'r', encoding='utf-8', errors='replace') as f:
                    lines = f.readlines()
                quoted = "'%s'" % branch_name.replace("'", "''")
                has_git_branch = any('GIT_BRANCH:' in l for l in lines)
                if not has_git_branch:
                    print('📋 [CONFIG] GIT_BRANCH: is empty - adding variable')
                    content = ''.join(lines)
                    if content and not content.endswith('\n'):
                        content += '\n'
                    content += '  GIT_BRANCH: %s\n' % quoted
                else:
                    out = []
                    for line in lines:
                        if 'GIT_BRANCH:' in line:
                            out.append(re.sub(r'GIT_BRANCH.*', 'GIT_BRANCH: %s' % quoted, line.rstrip('\n')) + '\n')
                        else:
                            out.append(line)
                    content = ''.join(out)
                with open(airflow_vars_path, 'w', encoding='utf-8') as f:
                    f.write(content)
                os.environ['GIT_BRANCH'] = branch_name

            def compile_dbt_project_manifest(folder_path, airflow_vars_path):
                """dbt clean, deps, parse in folder_path; append output to COMPILE_DBT_LOG (same as shell tee -a)."""
                target = dbt_target_from_airflow_vars(airflow_vars_path)
                print('===========================================')
                print('⚙️ [PROCESS] Compiling DBT Project Manifest')
                print('===========================================')
                parse_cmd = ['dbt', 'parse', '--target', target] if target else ['dbt', 'parse']
                with open(COMPILE_DBT_LOG, 'a', encoding='utf-8', errors='replace') as logf:
                    for argv in (['dbt', 'clean', '--quiet'],
                                 ['dbt', 'deps', '--quiet'],
                                 parse_cmd):
                        logf.write('\n--- %s (cwd=%s) ---\n' % (' '.join(argv), folder_path))
                        logf.flush()
                        proc = subprocess.run(
                            argv,
                            cwd=folder_path,
                            stdout=subprocess.PIPE,
                            stderr=subprocess.STDOUT,
                            text=True,
                            env=os.environ,
                            errors='replace',
                        )
                        logf.write(proc.stdout or '')
                        logf.flush()
                manifest_path = os.path.join(folder_path, 'target', 'manifest.json')
                if os.path.exists(manifest_path):
                    sz = os.path.getsize(manifest_path)
                    print('✅ [SUCCESS] DBT Manifest compiled (%s)' % sz)
                else:
                    print('❌ [ERROR] manifest.json was NOT generated — dbt parse may have failed silently')

            changed_files   = read_lines(CHANGED_FILES_PATH)
            changed_folders = [x for x in read_lines(CHANGED_FOLDERS_PATH) if x != 'README.md']

            print(f'Changed folders: {changed_folders}')
            print(f'Changed files count: {len(changed_files)}')

            if not changed_folders or not changed_files:
                print('No changed dbt folders or files detected. Writing SKIP.')
                write_matched([])
                sys.exit(0)

            matched_dags = []

            for folder in changed_folders:
                folder_path        = os.path.join(SRC_DIR, folder)
                manifest_path      = os.path.join(folder_path, 'target', 'manifest.json')
                dynamic_config_path = os.path.join(folder_path, 'dynamic_dag_config.yml')
                airflow_vars_path  = os.path.join(folder_path, AIRFLOW_SECRET_FILE_NAME)

                folder_changed_files = [f for f in changed_files if f.startswith(folder + '/')]
                if not folder_changed_files:
                    print(f'{folder}: no changed files, skipping.')
                    continue

                print(f'Processing {folder}: {len(folder_changed_files)} changed files')

                update_git_branch_in_airflow_vars(airflow_vars_path, BRANCH_NAME)
                compile_dbt_project_manifest(folder_path, airflow_vars_path)

                # Determine DYNAMIC_DAG flag
                dynamic_dag = False
                if os.path.exists(airflow_vars_path):
                    with open(airflow_vars_path) as f:
                        airflow_vars = yaml.safe_load(f) or {}
                    root_key = next(iter(airflow_vars), None)
                    if root_key:
                        dynamic_dag = str(airflow_vars[root_key].get('DYNAMIC_DAG', 'False')).lower() == 'true'

                if not dynamic_dag:
                    print(f'{folder}: DYNAMIC_DAG=False - single DAG project, always include.')
                    matched_dags.append(f'{folder}:__single__')
                    continue

                if not os.path.exists(dynamic_config_path):
                    print(f'WARNING: {folder}: DYNAMIC_DAG=True but dynamic_dag_config.yml not found. Skipping.')
                    continue

                with open(dynamic_config_path) as f:
                    dynamic_config = yaml.safe_load(f) or {}
                all_dag_names = list((dynamic_config.get('dags') or {}).keys())

                # Structural file change -> full run for this project
                changed_rel = {os.path.relpath(cf, folder) for cf in folder_changed_files}
                if any(b in STRUCTURAL_FILES for b in changed_rel):
                    print(f'{folder}: structural file changed - triggering full E2E for all {len(all_dag_names)} DAGs.')
                    for dag_name in all_dag_names:
                        matched_dags.append(f'{folder}:{dag_name}')
                    continue

                # Load manifest.json (committed in PR branch)
                if not os.path.exists(manifest_path):
                    print(f'WARNING: {folder}: manifest.json not found - falling back to full run.')
                    for dag_name in all_dag_names:
                        matched_dags.append(f'{folder}:{dag_name}')
                    continue

                print(f'{folder}: loading manifest...')
                with open(manifest_path) as f:
                    manifest = json.load(f)

                nodes  = manifest.get('nodes', {})
                macros = manifest.get('macros', {})

                # Build lookup maps
                file_to_tags         = {}   # rel_path -> [tags]   (models/seeds/snapshots)
                node_id_to_tags      = {}   # unique_id -> [tags]
                macro_to_dep_nodes   = {}   # macro unique_id -> [node unique_ids]
                macro_file_to_id     = {}   # rel_path -> macro unique_id
                test_file_to_node_ids = {}  # rel_path -> [node unique_ids]

                for node_id, node in nodes.items():
                    rel_path = node.get('original_file_path', '')
                    tags     = node.get('tags', [])
                    rtype    = node.get('resource_type', '')
                    node_id_to_tags[node_id] = tags

                    if rtype in ('model', 'seed', 'snapshot'):
                        file_to_tags[rel_path] = tags
                    elif rtype == 'test':
                        dep_nodes = node.get('depends_on', {}).get('nodes', [])
                        test_file_to_node_ids.setdefault(rel_path, []).extend(dep_nodes)

                    for macro_id in node.get('depends_on', {}).get('macros', []):
                        macro_to_dep_nodes.setdefault(macro_id, []).append(node_id)

                for macro_id, macro in macros.items():
                    rel_path = macro.get('original_file_path', '')
                    if rel_path:
                        macro_file_to_id[rel_path] = macro_id

                # Resolve tags from all changed files in this folder
                collected_tags = set()
                for full_path in folder_changed_files:
                    rel_path = os.path.relpath(full_path, folder)
                    if rel_path in file_to_tags:
                        collected_tags.update(file_to_tags[rel_path])
                    elif rel_path in macro_file_to_id:
                        macro_id = macro_file_to_id[rel_path]
                        for dep_node_id in macro_to_dep_nodes.get(macro_id, []):
                            collected_tags.update(node_id_to_tags.get(dep_node_id, []))
                    elif rel_path in test_file_to_node_ids:
                        for dep_node_id in test_file_to_node_ids[rel_path]:
                            collected_tags.update(node_id_to_tags.get(dep_node_id, []))
                    else:
                        print(f'  {rel_path}: not in manifest index, skipping')

                print(f'{folder}: collected tags -> {sorted(collected_tags)}')

                if not collected_tags:
                    print(f'{folder}: no tags resolved - skipping all DAGs for this project.')
                    continue

                # Match collected tags against each DAG's DBT_TAGS
                for dag_name, dag_config in (dynamic_config.get('dags') or {}).items():
                    dag_tags     = set(dag_config.get('DBT_TAGS') or [])
                    intersection = dag_tags & collected_tags
                    if intersection:
                        print(f'  MATCH: {folder}:{dag_name} (matched tags: {sorted(intersection)})')
                        matched_dags.append(f'{folder}:{dag_name}')
                    else:
                        print(f'  SKIP:  {folder}:{dag_name} (no overlap with {sorted(dag_tags)})')

            if matched_dags:
                print(f'\nTotal matched DAGs: {len(matched_dags)}')
                for m in matched_dags:
                    print(f'  -> {m}')
                write_matched(matched_dags)
            else:
                print('\nNo DAGs matched any changed tags. Writing SKIP.')
                write_matched([])
            PYEOF

            echo "==========================================="
            echo "📋 [CONFIG] matched_dags.txt contents:"
            cat /workdir/matched_dags.txt
            echo "==========================================="
            echo "✅ [SUCCESS] Tag-based change detection completed"
        env:
          - name: TARGET
            value: "test"
          - name: AIRFLOW_SECRET_FILE_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: AIRFLOW_SECRET_FILE_NAME
        resources: {}
        volumeMounts:
          - name: workdir
            mountPath: /workdir
    - name: validating-da-dependencies-e2e
      inputs:
        parameters:
          - name: branch
          - name: commit_short_sha
      outputs: {}
      metadata: {}
      container:
        name: ''
        image: '{{workflow.parameters.docker_image_repository_hub}}/{{workflow.parameters.docker_image_repository}}/{{workflow.parameters.data_analysis_import_core_image_name}}:{{workflow.parameters.data_analysis_import_core_image_tag}}'
        command:
          - bash
          - '-c'
        args:
          - |
            #!/bin/bash


            echo "==========================================="
            echo "🚀 [INFO] Data Analysis Dependencies Validation"
            echo "📋 [CONFIG] Branch: {{inputs.parameters.branch}}"
            echo "==========================================="

            # Default parameter
            cd /workdir/src || { echo "❌ [ERROR] Failed to change to /workdir/src"; exit 1; }

            echo "🔍 [CHECK] Scanning Data Analysis dependencies in changed folders"

            # Scan Data Analysis dependencies in changed folders
            while read folder; do
                if [ -d "$folder" ]; then
                    echo "==========================================="
                    echo "⚙️ [PROCESS] Validating Data Analysis dependencies in $folder"
                    echo "==========================================="
                    
                    cd "$folder" || { echo "❌ [ERROR] Failed to change to directory $folder"; exit 1; }
                    
                    # Set warehouse credentials
                    echo "📋 [CONFIG] Configuring data warehouse credentials"
                    
                    if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "bigquery" ]]; then
                        if [[ -z "$GCP_SA_SECRET" ]]; then
                            echo "❌ [ERROR] Google Bigquery credentials are missing: Service Account JSON not provided"
                            exit 1
                        else
                            if [[ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
                                echo "🔐 [CONFIG] Setting up Google Cloud authentication"
                                echo "$GCP_SA_SECRET" | base64 --decode > /secrets/sa.json || { echo "❌ [ERROR] Failed to decode service account secret"; exit 1; }
                                gcloud auth activate-service-account --key-file /secrets/sa.json || { echo "❌ [ERROR] Failed to activate service account"; exit 1; }
                                gcloud config set project $GCP_PROJECT_NAME || { echo "❌ [ERROR] Failed to set GCP project"; exit 1; }
                                export GOOGLE_APPLICATION_CREDENTIALS="/secrets/sa.json"
                                echo "✅ [SUCCESS] Google Cloud authentication configured"
                            fi
                        fi
                    fi
                    
                    if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "snowflake" ]]; then
                        if [[ -z "$SNOWFLAKE_PRIVATE_KEY" || -z "$SNOWFLAKE_PASSPHRASE" || -z "$SNOWFLAKE_ACCOUNT" || -z "$SNOWFLAKE_USER" || -z "$SNOWFLAKE_PASSWORD" ]]; then
                            echo "❌ [ERROR] Snowflake credentials are missing: Private Key and Passphrase Or Username and Password not provided"
                            exit 1
                        else
                            if [[ -z "$SNOWSQL_PRIVATE_KEY_PASSPHRASE" ]]; then
                                echo "🔐 [CONFIG] Setting up Snowflake authentication"
                                mkdir -p /snowsql/secrets/ || { echo "❌ [ERROR] Failed to create Snowflake secrets directory"; exit 1; }
                                echo "$SNOWFLAKE_PRIVATE_KEY" > /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to write Snowflake private key"; exit 1; }
                                chmod 600 /snowsql/secrets/rsa_key.p8 || { echo "❌ [ERROR] Failed to set private key permissions"; exit 1; }
                                export SNOWSQL_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PASSPHRASE
                                echo "✅ [SUCCESS] Snowflake authentication configured"
                            fi
                        fi
                    fi
                    
                    if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "redshift" ]]; then
                        if [[ -z "$REDSHIFT_PASSWORD" || -z "$REDSHIFT_USER" || -z "$REDSHIFT_HOST" || -z "$REDSHIFT_DATABASE" || -z "$REDSHIFT_PORT" ]]; then
                            echo "❌ [ERROR] Redshift credentials are missing: username and/or password not provided"
                            exit 1
                        fi
                        echo "✅ [SUCCESS] Redshift credentials validated"
                    fi
                    
                    if [[ "${DATA_WAREHOUSE_PLATFORM,,}" == "fabric" ]]; then
                        if [[ -z "$FABRIC_SERVER" || -z "$FABRIC_DATABASE" || -z "$FABRIC_PORT" || -z "$FABRIC_USER" || -z "$FABRIC_PASSWORD" || -z "$FABRIC_AUTHENTICATION" ]]; then
                            echo "❌ [ERROR] Fabric credentials are missing: one or more required parameters not provided"
                            exit 1
                        fi
                        echo "✅ [SUCCESS] Fabric credentials validated"
                    fi
                    
                    echo "🔍 [CHECK] Starting BI Model dbt metadata validation"
                    echo "🔍 [CHECK] Validating Data Analysis platform configuration"
                    
                    if [[ -z $DATA_ANALYSIS_PLATFORM ]]; then
                        echo "⚠️ [WARNING] DATA_ANALYSIS_PLATFORM is not defined, skipping validation"
                    else
                        echo "✅ [SUCCESS] DATA_ANALYSIS_PLATFORM is defined: ${DATA_ANALYSIS_PLATFORM}"
                        
                        if [[ "${DATA_ANALYSIS_PLATFORM,,}" == "lightdash" ]]; then
                            echo "⚙️ [PROCESS] Processing Lightdash platform configuration"
                            if [[ -z $LIGHTDASH_URL || -z $LIGHTDASH_API_KEY ]]; then
                                echo "❌ [ERROR] Lightdash configuration incomplete: URL or API key missing"
                                exit 1
                            else
                                echo "✅ [SUCCESS] Lightdash configuration validated"
                                echo "📋 [CONFIG] Extracting project configuration from secrets"
                                
                                export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME"; exit 1; }
                                export DATA_ANALYSIS_PROJECT=$(grep 'DATA_ANALYSIS_PROJECT:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DATA_ANALYSIS_PROJECT"; exit 1; }
                                export TARGET=$(grep 'TARGET:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract TARGET"; exit 1; }
                                export GIT_BRANCH=$(grep 'GIT_BRANCH:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract GIT_BRANCH"; exit 1; }
                                
                                if [[ -z "${DATA_ANALYSIS_PROJECT}" || "${DATA_ANALYSIS_PROJECT}" == "false" || "${DATA_ANALYSIS_PROJECT}" == "False" ]]; then
                                    echo "⚠️ [WARNING] Lightdash Metadata Validation is disabled, skipping"
                                else
                                    echo "⚙️ [PROCESS] Running Lightdash metadata validation"
                                    cp -r /usr/app/data_analysis_import/lightdash/dbt2lightdash/* ./ || { echo "❌ [ERROR] Failed to copy Lightdash validation files"; exit 1; }
                                    /bin/bash dbt2lightdash.sh 2>&1 | tee -a /workdir/data_analysis_validating_procedure.log || { echo "❌ [ERROR] Lightdash validation failed"; exit 1; }
                                    echo "✅ [SUCCESS] Lightdash metadata validation completed"
                                fi
                            fi
                        elif [[ "${DATA_ANALYSIS_PLATFORM,,}" == "superset" ]]; then
                            echo "⚙️ [PROCESS] Processing Superset platform configuration"
                            if [[ -z $SUPERSET_BASE_URL || -z $SUPERSET_USER || -z $SUPERSET_USER_PASSWORD ]]; then
                                echo "❌ [ERROR] Superset configuration incomplete: Base URL, user, or password missing"
                                exit 1
                            else
                                echo "✅ [SUCCESS] Superset configuration validated"
                                echo "📋 [CONFIG] Extracting project configuration from secrets"
                                
                                export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME"; exit 1; }
                                export DATA_ANALYSIS_PROJECT=$(grep 'DATA_ANALYSIS_PROJECT:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DATA_ANALYSIS_PROJECT"; exit 1; }
                                export TARGET=$(grep 'TARGET:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract TARGET"; exit 1; }
                                export GIT_BRANCH=$(grep 'GIT_BRANCH:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract GIT_BRANCH"; exit 1; }
                                
                                # Get the first top-level key (project name) dynamically
                                SNOWFLAKE_PROJECT_NAME=$(yq -r 'keys | .[0]' profiles.yml) || { echo "❌ [ERROR] Failed to extract Snowflake project name"; exit 1; }
                                
                                # Get the default target for that project
                                DEFAULT_TARGET=$(yq -r ".${SNOWFLAKE_PROJECT_NAME}.target" profiles.yml) || { echo "❌ [ERROR] Failed to extract default target"; exit 1; }
                                export SNOWFLAKE_WAREHOUSE=$(yq -r ".${SNOWFLAKE_PROJECT_NAME}.outputs.${DEFAULT_TARGET}.warehouse" profiles.yml) || { echo "❌ [ERROR] Failed to extract Snowflake warehouse"; exit 1; }
                                export SNOWFLAKE_ROLE=$(yq -r ".${SNOWFLAKE_PROJECT_NAME}.outputs.${DEFAULT_TARGET}.role" profiles.yml) || { echo "❌ [ERROR] Failed to extract Snowflake role"; exit 1; }
                                echo "✅ [SUCCESS] Snowflake configuration exported"
                                
                                if [[ -z "${DATA_ANALYSIS_PROJECT}" || "${DATA_ANALYSIS_PROJECT}" == "false" || "${DATA_ANALYSIS_PROJECT}" == "False" ]]; then
                                    echo "⚠️ [WARNING] Superset Metadata Validation is disabled, skipping"
                                else
                                    echo "⚙️ [PROCESS] Running Superset metadata validation"
                                    cp -r /usr/app/data_analysis_import/superset/dbt2superset/* ./ || { echo "❌ [ERROR] Failed to copy Superset validation files"; exit 1; }
                                    /bin/bash dbt2superset.sh 2>&1 | tee -a /workdir/data_analysis_validating_procedure.log || { echo "❌ [ERROR] Superset validation failed"; exit 1; }
                                    echo "✅ [SUCCESS] Superset metadata validation completed"
                                fi
                            fi
                        elif [[ "${DATA_ANALYSIS_PLATFORM,,}" == "metabase" ]]; then
                            echo "⚙️ [PROCESS] Processing Metabase platform configuration"
                            if [[ -z $METABASE_URL || -z $METABASE_API_KEY ]]; then
                                echo "❌ [ERROR] Metabase configuration incomplete: URL or API key missing"
                                exit 1
                            else
                                echo "✅ [SUCCESS] Metabase configuration validated"
                                echo "📋 [CONFIG] Extracting project configuration from secrets"
                                
                                export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME"; exit 1; }
                                export DATA_ANALYSIS_PROJECT=$(grep 'DATA_ANALYSIS_PROJECT:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DATA_ANALYSIS_PROJECT"; exit 1; }
                                export TARGET=$(grep 'TARGET:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract TARGET"; exit 1; }
                                export GIT_BRANCH=$(grep 'GIT_BRANCH:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract GIT_BRANCH"; exit 1; }
                                export PROJECT_ID=$(grep 'PROJECT_ID:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract PROJECT_ID"; exit 1; }

                                if [[ -z "${DATA_ANALYSIS_PROJECT}" || "${DATA_ANALYSIS_PROJECT}" == "false" || "${DATA_ANALYSIS_PROJECT}" == "False" ]]; then
                                    echo "⚠️ [WARNING] Metabase Metadata Validation is disabled, skipping"
                                else
                                    echo "⚙️ [PROCESS] Running Metabase metadata validation"
                                    cp -r /usr/app/data_analysis_import/metabase/dbt2metabase/* ./ || { echo "❌ [ERROR] Failed to copy Metabase validation files"; exit 1; }
                                    /bin/bash dbt2metabase.sh ${DATA_WAREHOUSE_PLATFORM,,} 2>&1 | tee -a /workdir/data_analysis_validating_procedure.log || { echo "❌ [ERROR] Metabase validation failed"; exit 1; }
                                    echo "✅ [SUCCESS] Metabase metadata validation completed"
                                fi
                            fi
                        elif [[ "${DATA_ANALYSIS_PLATFORM,,}" == "looker" ]]; then
                            echo "⚙️ [PROCESS] Processing Google Looker Enterprise configuration"
                            if [[ -z $LOOKERSDK_BASE_URL || -z $LOOKERSDK_CLIENT_ID || -z $LOOKERSDK_CLIENT_SECRET ]]; then
                                echo "❌ [ERROR] Looker configuration incomplete: Base URL, client ID, or client secret missing"
                                exit 1
                            else
                                echo "✅ [SUCCESS] Looker configuration validated"
                                echo "📋 [CONFIG] Extracting project configuration from secrets"
                                
                                export DBT_PROJECT_NAME=$(grep 'DBT_PROJECT_NAME:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DBT_PROJECT_NAME"; exit 1; }
                                export DATA_ANALYSIS_PROJECT=$(grep 'DATA_ANALYSIS_PROJECT:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract DATA_ANALYSIS_PROJECT"; exit 1; }
                                export TARGET=$(grep 'TARGET:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract TARGET"; exit 1; }
                                export GIT_BRANCH=$(grep 'GIT_BRANCH:' "$AIRFLOW_SECRET_FILE_NAME" | tail -n1 | awk '{print $2}' | tr -d "'") || { echo "❌ [ERROR] Failed to extract GIT_BRANCH"; exit 1; }
                                
                                if [[ -z "${DATA_ANALYSIS_PROJECT}" || "${DATA_ANALYSIS_PROJECT}" == "false" || "${DATA_ANALYSIS_PROJECT}" == "False" ]]; then
                                    echo "⚠️ [WARNING] Looker Metadata Validation is disabled, skipping"
                                else
                                    echo "⚙️ [PROCESS] Running Looker metadata validation"
                                    cp -r /usr/app/data_analysis_import/looker_enterprise/dbt2looker-bigquery/* ./ || { echo "❌ [ERROR] Failed to copy Looker validation files"; exit 1; }
                                    /bin/bash dbt2looker_bigquery.sh 2>&1 | tee -a /workdir/data_analysis_validating_procedure.log || { echo "❌ [ERROR] Looker validation failed"; exit 1; }
                                    echo "✅ [SUCCESS] Looker metadata validation completed"
                                fi
                            fi
                        fi
                    fi
                    
                    cd .. || { echo "❌ [ERROR] Failed to return to parent directory"; exit 1; }
                else
                    echo "⚠️ [WARNING] Working on root - skipping validation"
                fi
            done < /workdir/changed_folders.txt

            echo "==========================================="
            echo "🔍 [CHECK] Analyzing validation results"
            echo "==========================================="

            error_found=0
            warning_count=0

            if [ ! -f "/workdir/data_analysis_validating_procedure.log" ]; then
                echo "✅ [SUCCESS] No Data Analysis metadata validations were executed - log file not found. Skipping analysis."
            else
                while read -r line; do
                    [[ -z "$line" ]] && continue

                    # First check if this is a known good pattern (whitelist)
                    if echo "$line" | grep -E "is up to date$|Field '.*' not in|Done\. PASS=|commands may fail, consider upgrading your CLI" > /dev/null; then
                        continue
                    fi

                    if echo "$line" | grep -Ei "(warning|FutureWarning|DeprecationWarning|UserWarning|RuntimeWarning|\[WARNING\]|WARN:|WARNING:|/usr/local/lib/python.*/(site-packages|dist-packages))" > /dev/null; then
                        ((warning_count++))
                        continue
                    fi

                    # Then check for actual error patterns
                    if echo "$line" | grep -Ei '\b(fail|error|forbidden|denied)\b' > /dev/null \
                        && ! echo "$line" | grep -E "'.*ERROR.*'" > /dev/null; then
                        echo "❌ [ERROR] Error found in E2E Test DA validating procedure, log file line: $line"
                        error_found=1
                    fi
                done < /workdir/data_analysis_validating_procedure.log
            fi

            echo "==========================================="
            if [ $error_found -eq 1 ]; then
                echo "❌ [ERROR] E2E Test Data Analysis dependencies validation procedure has failed"
                echo "📋 [INFO] Please check the logs for details"
                exit 1
            else
                echo "✅ [SUCCESS] Data Analysis dependencies validation completed successfully"
                if [ $warning_count -gt 0 ]; then
                    echo "⚠️ [WARNING] Found $warning_count warnings during validation"
                fi
            fi
            echo "==========================================="
        env:
