            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: DATA_WAREHOUSE_PLATFORM
          - name: GCP_PROJECT_NAME
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_PROJECT_NAME
                optional: true
          - name: GCP_SA_SECRET
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_DATA_ANALYSIS_SA_SECRET
                optional: true
          - name: GCP_DATA_ANALYSIS_SA_SECRET
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
                key: GCP_DATA_ANALYSIS_SA_SECRET
                optional: true
          - name: DATA_ANALYSIS_PLATFORM
            valueFrom:
              secretKeyRef:
                name: fastbi-argo-workflows-secrets
